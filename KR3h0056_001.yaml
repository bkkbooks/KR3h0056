  - {type: page-break, offset: 0, content: '', id: KR3h0056_WYG_001-1a, image: WYG0817/WYG0817-0512c.png}
body:
  text: 真蹟日録卷一明張丑撰書畫舫成鑒家謂其粗可觀覽多以名品卷軸見示就正因信手筆其一二命曰真蹟日録隨見隨書不復差次時代如欲附儷前編俟後日更詳定云米菴主人張丑志項氏蔵松雪翁委順菴圖卷鮮于伯機自號委順菴求僕作圖僕遂戲為圖之或者乃謂本無此竟圖安從生僕意不然是直欲寫伯機胸中丘壑耳尚安事竟哉子昻孤松秀崇岡閒雲媚遙岑巖華動生意石泉鳴清音拏舟渡絶壑結茆並雲林牀頭散緗帙膝上横素琴我本丘壑人塵土日見侵賴君絶俗姿寫我遺世心願言荅清貺勇去投吾簪謝子昻詩附此樞委順菴為誰為鮮于伯機菴居在何許菴居西溪﨑遙林帶平津水竹遶幽扉茆廬照清泚竹房開翠微環堵著匡牀凝塵滿書幃漉酒脫墊巾讀書披深衣瑤琴雅曲奏玉麈清談揮翦裁不錦綺咳唾即珠璣花香擷秋蘋條甘飡春薇潄石枕寒流風雩浴晴沂持竿下釣沙科頭坐鳬磯山水娯髙深口體忘輕肥由來樂隠淪或足逃讒譏馬蹄從南來蜨魂常北歸臣子念君親家邦思宫闈異時屬子昻寫圖發天機霜毫幻烟靄水玉浮空霏心生萬法生先天天弗違造化歸筆端景物涵清暉巖崖毓秀潤草木含芳菲平遠即平逺嶔巋即嶔巋囿形情想巾疇誰逃範圍從無而有有衆竟是耶非翁兮笑不荅仰靣看雲飛天竺人有在題曠懷達委順遊思丘壑美茅堂春日永獨坐對流水流水有清音寫我膝上琴凝神託毫楮悠然千古心真定張守正亂石岌齒齒横波帖如砥持此觀委順委順乃如是掲傒斯鮮于伯機委順菴者有菴之名實無菴之竟右圖乃松雪胸中之丘壑也何云寫伯機胸中丘壑乎想有是竟而摹之易即無是竟而創之亦易惟黙傳其天衷之神竟為難非生平心同琴瑟道協漆膠者不能著筆也今觀此圖筆法竒突文采驚人曠乎有天髙地迴之思無古無今之勢匪伯機胸中不能具此丘壑微松雪豈能寫伯機之胸中乃亦松雪早年之神筆也即吾鄊馮子仲處有松雪與伯機論書卷各有丈餘皆得二王筆法前有劉仲賢一圖作兩公促膝抵掌髙談文房左右尊鼎參差多人侍立珍寶盈几其伯機之貌正肖此也然不免少露富貴氣象此卷人物尤小面貌如生神而且逸更為超軼可謂同作驪珠並馳方駕千載風流一朝俊偉者也清軒老人程南雲識元趙文敏公為鮮于伯機畫委順菴圖其直一百五十金明萬厯六年孟秋七月裝池墨林項元汴珍蔵真蹟青浦曹氏收周文矩唐宫春曉圖絹本著色全師周景元凡為人大小八十有一器具無算似藁本後有張澹巖澂䟦尾乃紹興庚申嵗筆也䟦首墨字改為唐字董𤣥宰太史家捕魚圖小本絹本重著色相𫝊為松雪翁筆雖破碎而神采煥然真筆神品不疑耳又見松雪翁竹石巨幅款云子昻為正學作黄大癡臨董北苑夏山圖巨幅絹本淺綘色筆法雄偉亦在董太史家真蹟神品上上倪元鎮寫贈袁子方郎官夜景小幅絹本師董源按年作于至正四載時年四十有四至洪武庚戌重題時年七十有一而云六十五嵗竊所未解董𤣥宰至以四載為元鎮四十時畫亦非也詩題全似水竹居體為真無疑其畫本屋宇作界畫兼有人物舟船又一竒也某疑上方重題并王朝臣詩箋恐屬後人蛇足耳雲間陳氏蔵郭熙春曉圖絹本水墨巨幅筆法超脱生平所閲熈畫宜為冠沈啟南卧游小冊絹本凡廿四幀按䟦尾經始于甲子之嵗圖成于丙寅之春時年政八十矣而精細古雅氣可食牛是宜子畏徴仲諸公歛衽屈服也此冊今在王越石處梅道人放光觀音一軸中峰和尚讚云雲山竹石水沈沈一道靈光亘古今童子望崖空合掌不知路遇古觀音梅華道人畫并書真蹟倪元鎮畫優鉢曇花小幅十竹已安居忍窮如銕石寫贈一枝花清供無人摘至正辛丑六月五日過訪十竹髙士煮茗焚香作此花贈之倪瓚怪底倪迂灑墨花時人那識是竒葩林間有箇西來鳥認得維摩處士家安陽韓性佛國名花葉更竒稜稜秀色世間稀是從天女初來散落在毘陵人不知金鏞此花非是凡間品東海倪儂紙上栽若萐柔枝塵不染清芬滿室四時開王棟十竹蕭蕭午夢長客來煮茗灌詩腸雲林更自閒相過筆吐竒花墨韻香趙儼天宫散落此名花飄入梁谿偉士家只恐上方收拾去詩人姓氏佛前誇馬治雲林刻畫稱神手不冩人間萬卉花竊得一枝天上種懶塗紅白自清華杏村主人髙士優鉢曇花筆㡳栽不霑雨露萬年開芙蓉山下倪郎在振世竒才不復恢宋克真蹟唐子畏泉石幽踪圖十年阿對在泉頭草衣木食傲王侯枝梧白眼看天際尚嫌鴻鵠為身謀唐寅趙大年江湖八景圖其對題八詩作雙井體而削去題名後有郭畀跋也仇實甫青緑細山水卷猷墨林山人項元汴祕觀于幻浮齋中時立夏日試恵泉心賞不已俟暇日有意持來再閲人生快事其樂何如宋趙伯駒浮巒暖翠圖仇英臨墨林項元汴清玩原價八兩猷明嘉靖四十五年秋日裝池沈啟南有竹居圖上有劉廷美徐元玉詩佳桃花書屋小幅早年作書畫尤精並在東倉周氏倪雲林筠石喬柯蕭蕭風雨麥秋寒把筆臨摹强自寛尚賴俞君相慰藉松肪笋脯勸加餐四月十七日風雨中叔經茂異攜酒殽相餉於晩節軒中因為寫筠石喬柯并題絶句雲林子瓚新試羅裳怯薄寒客懐全賴酒杯寛獨憐晚節軒中竹翠色娟娟若可餐袁英真蹟虞永興小楷破邪論按此係已刻書畫舫今刪韓太沖龜兹舞女卷今訛為演樂圖非右畫絹本大著色全學陸探㣲前後凡十二人又嬰孩二竒樹一品亞周昉揮扇士女卷而收蔵得地筆墨如新後有雙龍方璽柯九思墨印王芝私印皆真左方蘇飬直呉傅朋倪元鎮三䟦並屬蛇足可拆去之米南宮手簡芾頓首再啟比苗幕過道從輿衞於瑯琊之間為泉石之樂恨不接游跖也滁天下佳山水且少過客諒稱高懐正恐賜環在邇不能久彼留也芾頓首再啟十一日二君一飯幸肻顧芾頓首真蹟海嶽真蹟和嚴道培書院韻城頭山脚舊圖開華構凌雲亦壯哉談席昔人文獻地升堂此日豫章材絃歌化裏清風動麟鳯天南紫氣來獨奈巖阿叢桂冷幽棲不是偉長才髙館褰帷萬象開西山翠八氣佳哉六經重振南方學千里還徵上駕材鸞鶴遶庭翔更集雲霞拂棟去還來古今同被絃歌化林卧其如老不才元章朝散郎書學博士賜緋魚袋臣米芾上伏念臣一介微賤初無片善足稱場屋不第叨竊賞延偶當輪對入覲清光伏奉聖恩寵錫宸翰欣榮載懐夙夕不置如臣學識至疎詞藝至陋敢圖睿主有此寵賜其為遭遇葢千載未易逢者臣之僥倖則可知矣恭惟聖上萬幾之暇醉心韋編寓意聲畫莫不造入睿智精微之域如臣何知縦極口語實無能名管中之見但歎宸毫氣秀韻古縦横自如一點一畫莫不中道締玩愈久詠頌無斁伏願天地齊久日月並光臣謹薰緘秘永作𫝊家之寳手舞足蹈仰祝萬年之瑞恭奉表陳謝以聞朝散郎書學博士賜緋魚袋臣米芾上真蹟王右軍鶻不佳帖按此條已刻書畫舫今刪米元章尺牘䟦坡老題米元章所蔵右軍思言三帖云君家兩行十二字氣壓鄴侯三萬籖元章筆不盡如右軍然亦奕奕神彩不作强弩砍陣勢數之得字至三十二吾不知孟氏所蔵書視鄴架如何其賞愛之當亦不下坡老也苐方先生以受知先帝一語謂為貽坡老者則不然元章蘇門後進中醍醐往還竿尺極綿篤決不作世情鹽醯語名諱一印章亦畫蛇之足聊為拈出之勿使强解事者作口實也世貞題王弇州續稿倪元鎮小楷呉道子善畫得神仙術周游人間𤣥宗聞而召入宫庭有粉牆數尋俾畫山水道子請用墨漿一缶潑於壁上以幕覆之俄頃請上臨視山水林木人烟鳥獸無不備具而且精妙道子徐步指㸃巖下一小洞叩之忽開一童子在側道子奏曰此洞有佳致臣請入為陛下先遂躍而入俄頃門閉守城卒曰道子出矣再往視所畫處乃瑩壁也無復山水其異如此戊申冬日倪瓚書于清閟閣真蹟沈啟南畫册沈啟南先生此八幀掩映綿羃遂為吾呉地𫝊神或猶以書法疑之葢少來精謹尚守渠家民則法未及作雙井老態故也世貞真蹟研北雜志真蹟吏部侍郎葛立方因陛對髙宗從容語及前代書法曰唐人書雖工至天然處終不及魏晉如鋪算之狀皆非善書立方對曰古人論書先論筆法若不能求用筆意于㸃畫之外便有鋪算之狀矣上曰然趙子固云書字當立間架牆壁方免骫骳之弊思陵書法未嘗不圓熟要之于間架牆壁處不著工夫是避印板鋪算而不知流入欹側矣學者勉之栁子厚自言僕蚤好觀古書家所蓄晉魏時尺牘甚具又二十年來徧觀長安貴人好事者所蓄殆無遺焉以是知善書者雖未嘗見名氏望而識其時也袁伯長父又云嘗聞善書者云大篆不得入小篆𨽻書最懼入八分京師人家有王晉卿都尉寳繪堂畫帙仙佛折枝禽畜凡三帙後入宣和内府徽宗自書畫人姓名復加寳璽其上韓侂胄閲古堂圖書皆出于向若冰鑒定魏晉𨽻書以匾古為工至唐虞永興褚河南猶守舊法唐世碑刻作字逾廣遂以長勁為能而悉變矣近世能書家不屑顔栁競為李北海書而𨽻體逐絶余拙于書而善鑒未有能易余言者定武禊序唐文皇摹本所刻故毫髪無踰矩至徧賜諸王羣臣則皆一時能書所臨精神横逸雖抵掌相似然猶以為優孟也予所見元嘉賜本第一神龍第二蘇才翁家第三才翁本則祖神龍褚河南悞字本第四馮承素本第五褚庭誨本第六陸柬之本第七趙模本第八最後見米老所傚褚河南第九傚馮承素第十紹興内府蔵本第十一皆臨畫與定武本㣲異皆繭紙非雙鉤響搨所作獨張似之家絹本云是湯普徹所摹本不同耳評書家嘗言率更書難雙鉤葢其落筆全在骨法若填補肥媚則失其體舊見唐彦猷摹羊帖筆意絶近此卷髣髴之矣隅隩帖顧野王玉篇惟越本最善末題㑹稽呉氏三一孃寫問之越人無能知者楷法殊精余家有後唐人洪贇所書放生軌儀一卷行筆精𦂳有股釵畫沙之妙不知何人而楷法如此題云長興元年歲次庚寅九月一日寓四天王寺金毘羅院于蔵經中鈔寫漢命放生軌儀法一卷文林郎前攝梁州司馬洪贇書南唐雖僣偽一方風流特甚逮今楮墨書畫皆為世寳人物文章亦盛長安安信之子允為邵澤民言舊蔵韓退之家集第二十六七兩卷繭紙正書有退之親改定字後為張浮休取去趙忠簡公家故蔵韋偃畫松絶妙上題韋偃嵗寒圖廣政二年十月七日奉㫖將仕郎守將作監臣黄居寀識旁有小古印及得全堂諸印忠簡在貶所嘗失之其孫盛後于他書畫得之至今蔵其家云趙子昻學士論書云書法以用筆為上而結字亦須留意葢結字因時相𫝊用筆千古不易右軍字勢古法一變其雄秀之氣出于天然故古今以為師法齊梁間人結字非不古而乏儁氣此又在乎其人然古法終不可失也趙伯昻擕懐素狂僧帖玉馬玉人劍璏㻫琫李超潘谷等墨來觀張伯雨記其先人似之所蔵書畫云湯普徹絹本摹蘭亭唐臨王右軍三帖張長史春草帖王齊翰仙山圖徽宗畫上清楊真人像常粲佛因地圖此卷今在倪元鎮處范寛三幅雪山二幀僧巨然夏山雨過許道寧溪山待渡等圖李漸二馬圖李伯時于闐師子三馬圖黄筌梔子孔雀芙蓉鷺鷥二圖趙昌寫生月季黄居寀竹雀唐希雅棘雀趙大年聚沙宿雁圖其他妙品尚多也伯雨又嘗購得孟子舟御史所蔵僧智永月儀獻嵗帖神品上上其辭云獻嵗將終青陽應節和風動物麗景光輝翠栁舒鱗紅桃結綬想弟優游勝地縦賞嘉賓酌桂醑以申心玩琴書而寫志無令披聚敘㑹何期謹遣一介希還數字行間細書釋文特妙前後有明昌七印泥金題籖今在梁谿倪元鎮家黄長睿以為何璧所書者即此帖也虞伯生曰昔我文宗皇帝天下太平文物大備自其在東宫時賢能才藝之士固已盡在其左右文章則有故翰林學士元公復初發揚蹈厲藐視秦漢書翰則有故翰林承㫖呉興趙公子昻精審流麗度越魏晉前賢侍讀學士左山商公徳符以世家髙材游藝筆墨偏妙山水尤被眷遇葢上于繪事天縦神識是以一時名藝莫不見知也而永嘉王振鵬妙在界畫運筆和墨毫分縷析左右髙下俯仰曲折方圓平直曲盡其體而神氣飛動不為法拘嘗為大明宫圖以獻世稱妙絶延祐中得官稍遷秘書監典簿得一徧觀古圖書其識更進葢仁宗意也語具研北雜誌此振鵬龍舟奪標圖别本向係分宜權相故物見之文休承嚴氏書畫記其圖精細古雅不讓郭恕先輩對客展觀令人目眩後有振鵬詩䟦并李源道以下十五題詠其後折俸事起旋為韓存良太史所購近始歸之崑山張丑謹疏始末如右時崇禎紀元端午日也季宗元蓄唐摹王右軍周大㛮帖乃開元五年十一月陪戎副尉張善慶装鮮于伯機目趙子昻神情簡逺為神仙中人趙子昻云唐人畫實描雲水葢刻畫中有飛動之意後人所難能也顔魯公子侍郎之孫家有鍾紹京書黄庭經紙尾題特健藥三字按武平一徐氏法書苑云中宗駙馬武延秀家法書漆軸黄麻紙標題云特健藥云是蕃語其書合作者一云宋以之標法書上品洪景盧詩云㑹有髙明標健藥葢用此語余家有唐人寫論書法一卷皆率保大中潤州延陵牒延陵宋熙寧五年省入丹陽喬仲山有唐羅昭諫與陳正字帖云二月中陳州一正字訪及具審博士攝理和適近日賢主司空政事才用洋溢譚口㫁割明快與敓有分守道者自然安矣况博士乎先太傅所作所立果有餘慶殊不知天道去人如此相近忭賀老叟十年來欲棹一船子從雲溪館前往東市竟無因緣此又何如哉近見陳正字否葉大徳丁三傅知聞否老叟腰脚不枝坐想勝㳺目極千里朱十五李三史作何靣孔髙積薪復如何因相見皆與話瞻泳也謹狀羅隠狀後有䟦云法帖率不過數行而言簡意盡猶足見晉宋間人物風度今羅長江書纔爾片紙乃知風流逮唐末猶在也近日往來尺牘疊疊多幅苟為不然則曰簡慢我於是務作不情之語以為敬近至權貴記室之間聞一函有累十紙風俗頽壊至此可太息也張與可家有周昉五星真形圖昉為宣州長史日所畫其星法亦昉手自書竹簡之法絶而不𫝊米元章得古簡始更制法季宗元就賈團練家得顔魯公自書誥吾家太史云冬至後九日遇壬法當有年趙子固目姜堯章為書家申韓宇文廷臣文孫家有呉彩鸞玉篇鈔今世所見者唐韻耳其書一先為廿三先廿四仙不可曉又導江迎祥寺有彩鸞書佛本行經六十卷或者以為特唐經生書也鍾王筆法隋人所得與唐人不同大抵隋多鍾唐多王爾世謂正月三日為田本命浙西人謂之下正三言夏正之三日俗以是日秤水以重為上有年則極驗丹陽葛魯卿論書云晉宋人書法妙絶未必盡曉字學牟伯成父曰今之文非古之文故六籍多𫝊譌今之音非古之音故易詩韻有未協者胡汲仲謂趙子昻書上下五百年縦横一萬里舉無此書趙子昻小楷左氏春秋𫝊全本在錫山安氏書法精𦂳非梵網經之比可寳蔵也吾家太史謂李端燕郭曖駙馬宅詩衆稱絶妙而其詩不𫝊頃在秘閣鈔書得端集三卷中有贈郭駙馬二首特太史偶未見本爾歐陽率更書稽古在李叔固家末云卷絶趙子昻學士云書貴紙筆調和若紙筆不佳雖能書亦不能善也譬之快馬行泥淖中其能善乎鍾太傅篆書孔廟鼎銘按此條已刻書畫舫今刪李伯時三清圖紙本白描極精凡為人物三百四十宫殿四十餘尤是圓光下段幾于神化乃武林髙瑞南故物先曾入倪雲林蕭閒書館者卷尾印識具存真神蹟也按以上已刻書畫舫又見伯時山庄圖長卷其樹石人物雲水屋宇怪怪竒竒惜前後為庸工裝背翦損其後䟦尾亦詳記之李伯時石勒問道圖絹本計四人墨地白描又一格也前有宋紙一張後有大安元年宫昌題䟦卷係宋裱三十一行書法米南宫其花紵亦今時所無卷尾宋紙五接石勒參佛圖澄圖舜舉磊落為人天下竒來參佛法始知機一言能悟圓通理却笑劉聰事事非呉興錢選舜舉題詩不真趙文敏公行書中峰和尚懐淨土詩百八首作梵册裝連偈䟦共百廿則内失七則并前阿彌陀佛像亦亡其字全仿蘭亭遒勁可喜乃嚴分宜故物也又文敏公書酒德頌真蹟全學羲獻在王越石處韓存良家秘蔵韓魏公像卷云是米老畫并元章楷行當時祭文一首在前董𤣥宰䟦之甚詳余細辨之像屬北宋畫院名手其祭文係思陵之筆故有御書等印乃秀水項子京故物也又蔵黄涪翁為巽上人行書華嚴疏計一百十二字用花綾書之雖破碎而神采煥然終不失為名蹟也此卷至今尚在韓氏王子擕示雅宜山人手錄詩經正文小冊行草精好計一百四十五番余定為倣書非真蹟其人怫然見于辭色余曰主臣有之僕姑毋論其八法只令竹紙果能幾及百年而不變色乎其人首肻而退未幾獲觀真本于嚴氏魚目夜光相去葢天淵矣宋人手錄治疫方用黑豆二合炒令香熟甘草二寸炒令黄色二味以水二盞煎取一盞時時服之甚良字法大類米老或云元暉筆也米南宫小楷千文真蹟其辭與行世本小異曰天地𤣥黄推位遜國周發商湯女慕清潔籍甚無競桓公輔合沈黙寂寞河渠滴歴具膳飡反羲暉晃耀裴回詹瞭前後十一句董𤣥宰䟦云米海岳行草書𫝊于世間與晉人幾爭道馳矣顧其平生所自負者為小楷貴重不肻多寫以故罕見其蹟予㳺京師曾得鑒李伯時西園雅㑹圖有宋米南宫蠅頭題䟦最似蘭亭筆法己丑四月又從唐完初獲借此千文臨成副本稍具優孟衣冠大都海岳此帖全倣褚河南哀冊枯樹賦間入歐陽率更不使一實筆所謂無往不收葢曲盡其趣恐真本既與余逺便欲忘其書意聊識之于紙尾是月十八日董其昌題此余己丑所臨也今又十年所矣筆法似昔未有增長不知何年得入古人之室展卷太息不止書道也戊戌四月三日真蹟倪元鎮書張祐題王右丞山水障子二首精華在筆端咫尺匠心難日月堂中見江湖滿座看夜凝嵐影溼秋浸璧光寒料得昔人意平生詩思殘右丞今己没遺畫世間稀咫尺江湖盡尋常鷗鳥飛山光全在掌雲氣欲生衣以此長為玩平生滄海機懶瓚真蹟孫過庭行書孝經一卷真蹟也今在董太史家其字與書譜稍異是早年筆戲鴻堂所刻景福殿賦宛然書譜法也韓魏公像卷韓魏公天生元聖必作之配有神司之不約而㑹既生堯舜禹稷自至仁宗龍飛公舉進士妙齡秀發秉筆入侍公於是時仲舒賈誼方將登庸盜起西夏四方騷然帝用不赦命公秉越往督師旅公於是時方叔召虎入贊兵政出殿大邦恩威並行春雨秋霜兵練民安撫鎮邊疆公於是時臨淮汾陽帝在明堂欲行王政羣后奏功罔厎于成召自朔方付之樞衡公於是時蕭曹魏邴二帝山陵天下悸恐呼吸之間有雷有風有存有亡有兵有戎公于是時伊尹周公功成而退三鎮偃息天下嗷然曷日而復畢公在外心在王室房公且死征遼是恤嗚呼哀哉六月甲寅人之無祿䘮我宗臣我有黎民誰與教之我有子孫誰與保之巍巍堂堂寧復有之公之云亡我無日矣慟哭流涕何嗟及矣昔我先子没于東京公為二詩以祖其行文追典誥論極丹青公言一出孰敢改評施及不肖待以國士匪我自知公實見謂父子兄弟並出公門公不責報我豈懷恩惟此涕泣實哀斯人有肉在俎有酒在尊公歸在天寧聞我言子瞻之文元章書之魏公相業足稱三絶余館師韓宗伯有願為魏公故購此卷惜靳之上夀海内未沾公之德澤然千載尚友聲應氣求此朝集所為珍䕶如頭目腦髓非獨以書也感慨係之矣董其昌觀因題宋畫韓魏公像米氏書思陵秘閣之物墨林項元汴家蔵天籟閣真賞嘉靖四十四年冬購于王文恪公孫峰山處用價十二金裝襲永保素真蹟項氏擕售松雪翁廬山觀瀑圖紙本大著色金碧輝映全學唐人雖尺紙經營而極悠深𤣥逺之趣且其冩太白遺照宛然當日風標匪趙王孫之妙染胡能得李王孫之軒舉耶本身趙氏子昻一印却真其子昻二字係雙鉤廓填乃蛇足也自洪武至成化間名賢題咏凡十三人向為姚公綬故物今歸猶子誕嘉處聞今又屬他姓中心蔵之何日忘之苐恨嚢澁如子美一交臂而失焉良可太息是日又示宋拓五字不損本蘭亭褉序後有榮芑䟦一陳繹曽王士熙等䟦五李白觀瀑一事錢選亦有短圖所畫李白外止一騎一從為少異耳而瀑亦不甚雄偉後有劉文成宋文憲胡文穆三詩及解大紳印記近蔵上海朱太學邦憲家王元美為之作䟦見弇州續稿内可核也戴生擕示項又新蔵名卷首為顔魯公爭坐位帖半卷蔡君謨手帖米元章易說帖趙子昻臨子敬授衣等四帖後有俞焯張天陽䟦其次惠崇莊列髙風一為莊周夢蜨二為列子御風更兼惠崇小楷題識及葉石林等䟦並妙李嵩錢塘觀潮絹本淺絳色佳又其次劉松年中興四將小像首劉次韓次張次岳後有俞貞木䟦記也錢選山水故實二卷一為淵明歸去來一為和靖孤山探梅二卷中孤山尤勝是日所見凡廿卷餘所可記者列之右方其國朝沈文陳陸等製雖佳不悉志云時甲子清和十日也戴生云蔡君謨八帖米元章九帖並在項氏繼此當續示云范寛長江萬里圖神品上上雪山汶川虎頭山永康軍離堆青城山六六峰新津眉州瓦屋山大像月峰嘉定府大峨山敘州瀘州合江重慶府涪州忠州萬州雲安軍䕫州八陣灩澦白羊影瞿唐峽白帝城赤甲白鹽沙堆灘黑石巫峽百八盤巫山縣神女廟十二峰吒灘歸州雙廟新灘蝦蟆培假十二峰黄牛影黄牛珠洺川廟無義灘平善壩辰州界鼎澧界至喜亭峽州沙頭金沙堆洞庭廟江陵府洞庭湖君山吕仙亭岳州嘉魚縣漢陽軍鄂州赤壁夀昌軍黄州雪堂蘄陽鎮富池琵琶亭江州廬山五老峰南康軍落星寺大孤山澎浪廟馬當廟東流縣小孤山鴈义鎮九華山池口銅陵縣繁昌縣蕪湖縣建康府眞州鎮江府𤓰洲金山焦山海門昔在苑西有呉太學持范中立江圖見視位置正如此卷猶心疑為裴旻之號今見真本快心洞目之觀始自信鑒裁不謬董其昌題嚴開宇蔵米南宫八帖在張子京家米書九帖之上皆檇李項氏故物也又示沈啟南呉江圖長卷水墨師荆浩脱去畫史縱横習氣純以天趣出之所見長卷宜為最詳其題識葢為徐克成作也後有呉原博一詩亦妙黄王合作小幅僕暇日為郡曹劉彦敬畫竹趣圖甫畢而一峰黄處士見過僕出此求印正處士以為可為添一逺山并樵逕天趣逈殊頓增深峻矣時省郎耿君督兵華亭索僕畫甚急思拙筆弱頃刻不能就因輟此奉獻呉興王蒙敬題叔明公子文敏公之外孫也天姿神品其于翰墨深入晉漢至于鑒裁尤所精詣漚波之宅相非子而誰耶至正壬辰冬人公望拜真蹟項氏蔵李嵩服田圖卷係宋御府裝池前後凡十二段每段有思陵楷書詩題詩中凡云耘雲等字皆缺其㸃未詳係某廟諱字當考畫上識以紹興小璽乾卦圖書井井可玩其卷通幅長絹以墨界斷末有李嵩畫三字題名按思陵雖係偏安之主而能留心農事亦可謂之賢矣按以上已刻書畫舫又蔵陸放翁與仲仁明逺二柬後柬刻停雲館帖内末有文夀承題䟦亦一名蹟又有黄大癡秋嵐積翠直幅案題為性之作筆法簡古設色雅淡且絹素精好尤不易得云趙子昻三生果圖在新安呉仲暉家神妙可喜其家又蔵倪元鎮呉松山色一軸秀潤精美層疊無窮而翁極筆也宋搨臨江二王帖三卷凡一百四十五帖計缺五帖綿紙蟬翅拓本前有沈洪題署後有祝允明䟦王世貞識尾并長歌一篇上中兩卷全止大令卷内配八十三帖而缺益州以下雖紙墨稍異亦宋南渡佳搨也今在嚴道普家韓朝延自述其家書畫精良者定當以王逸少樂毅論小楷真蹟為最樂毅已亡亦重言耳其次則梁武帝異趣帖唐懐素書畫訣帖此帖係薛濤箋所書後有臣柯九思進入六字前後有悦生秋壑圖書及元朝天厯之寳周昉對鑑士女圖後有宋思陵柯九思題䟦宋李公麟白描子儀單騎降虜圖米芾雲山圖並有思陵識尾黄庭堅書李白秋浦歌粉澤紙書元趙孟頫書髙峰和尚行狀宋紙所書一紙長五丈許字倣禊帖南宋思陵行書北山移文今皆散逸不存矣惜哉其尤可慨者曹弗興兵符圖有梁隋貞觀御筆標題此卷近為六丁取去至今尚在夢想法書中有兩本並佳難分真偽者如唐顔魯公鹿脯帖一在檇李項氏一在王辰玉家宋黄涪翁書李白秋浦歌一在韓城良太史氏一在董𤣥宰尚書家五字不損本禊帖趙子昻十三䟦卷一在檇李項氏一在陳季白家雖善鑒者莫能辨其高下矣華學士家徐浩小楷道徳經真蹟黄素寫本今歸董太宰太史處惜乎缺其下卷或云屬唐人寫經手過矣又浩正書朱巨川誥真蹟後有張晏等䟦今在韓存良宗伯家亦名蹟也張芝知汝帖真蹟後有海岳䟦幾二百字在秀水項氏曹弗興兵符圖按此條已刻書畫舫今刪陸生擕示黄大癡玉岑松壑小幀絹本淺絳色上有真書題款二行葢為玉澗作者右方有王炳趙奕李和三詩足稱神品是日又示大癡縹緲山居巨幅畫法髙古所惜收蔵稍劣不稱神明煥然耳又云家有唐子畏秋山蕭寺全學王蒙筆意未及示云顔清臣祭伯濠州刺史文真蹟在李九疑處又祭姪季明文真蹟在呉象成處皆名物也而祭姪尤為傑出云震澤王氏蔵呉道子毘沙門天王小直幅絹本著色全學張僧繇凡為天人大小共三十異獸二中間旌旗器具一一古雅且竒偉也尤是雲烟水石山頭屋宇逺近布置竒特上方具唐呉道子述五字思陵書也并有乾卦圖書御書小璽曲脚封字等印與韓存良家張僧繇五星二十八宿卷筆法若合符節是呉生盛年畫不疑耳聞其家尚有李成烟波漁艇一軸筆法尤異未及見之李畫烟波漁艇極精惜破損已極前有長少李兆蕃題署後有董其昌䟦尾王獻之能為一筆書陸探㣲能為一筆畫乃是自始至終連綿相屬氣脉不斷耳王應麟云曾子固䟦西狹頌謂所畫龍鹿承露人嘉禾連理之木漢畫始見于今邵公濟謂漢李翕王稚子髙貫方墓碑刻山林人物乃知顧愷之陸探㣲宗處士輩尚有其遺法至呉道𤣥絶藝入神始用巧思而古意稍減矣今于盤洲所集𨽻圖見之李成峰巒林屋雲景皆以淡墨為之而水天空處全用粉填亦一竒也每以告人非愕然而驚則莞爾而笑莫知其妙足見後學之凡下也尉遲乙善繪凹凸花或云乙是僧又張僧繇畫于一乗寺逺望眼暈如凹凸近視即平楊升菴嚴道普蔵米南宫八帖真蹟神品上上芾頓首再啟王御史廟額有俟發潛想留神慮修廟記一本上納係俸錢所印伏乞悉門中清勝新恩令嗣必已還侍下未敢附問芾頓首再行廟額帖芾頓首再拜知府内翰丈台坐芾奔走道塗自承榮命久未寧止有疎上記思仰所深比至真始得作此夏序已老恭惟神明相佑台候起居萬福芾比蒙恩未卜披豁區區結約難罄下懐不備芾頓首再行知府内翰丈台坐五月晦狀奔走帖芾頓首再啟老不脱州縣可憐幸嵗豐無訟而賢守相照得以苟祿忽已半嵗冬杪敬伏東閤芾頓首再行州縣帖芾皇恐新𤓰洲閘中閘傍隋臨江故宫基一髙臺昨曾孝蘊建大亭其上未名而去正對鶴林黄鶴上皇下皇山下視金山旁迎羣峰如圖無纎翳乃山𫝊神也戲作一賦上呈乞改抺芾皇恐再行臨江帖芾皇恐𤓰洲非復往年亭榭登臨江山之間與壯觀甲乙新于江口得地一片深濶無一畝黄鶴臺所見相多少傍是兩浦橋因命為江郊百川浦作草堂基未有資得小詩數篇上呈芾異時歸早作此屋來往江南北游戲焉芾頓首再行𤓰洲帖芾頓首再啟公手翰成十軸獨未有入兩府手札也願惠荅使在秘玩中知公終始眷遇不替餘俟降麻别馳賀次公執政矣誰為經綸客望大啟東閤延天下士為睿主致太平芾雖駑蹇文武之用惟所命焉芾頓首再行手翰帖芾頓首再啟度九月奏計即留禁從芾十一月滿九月為入季至時申求一巨舟西上我公任内與之後人必不易也䖍扣䖍扣元龍在丹徒否傾二渴二到此作海岱樓得蔣張諸公詩馳上暇日求我公大句以光陋邦何如造次慚悚慚悚芾頓首再行奏計帖門中上下均慶芾頓首再行門中帖真蹟米海嶽二帖念與公咫尺契濶楗隣又無效好物又不送過來悵悵將還有古錦一尺許天下第一等者欲褾破羌求易之如何須薄者佳筆不佳紙不好草二芾頓首周臣觀察台坐不煩如此前言甚易當必不到入臺章也芾頓首安中吾友右米南宫與周臣觀察二帖詞意簡直古人之相與如此亦可見其平生矣南宫之書世人所愛重而此書乃竒妙者又周氏子孫能世蔵之是尤可珍重也臨川王英識襄陽米南宫書如高峰墜石勢莫可攖三百年來虹光如在較之他書則莫能居其右宜善寳之沛郡鎦翼南米南宫邁往之氣傲倪物表玩弄人間形于翰墨固不以繩尺拘而靄然有真實意前輩風流篤厚葢如此海岳舊址在潤岳倦翁神交于江山之上心㑹于風烟之外摭遺墨瑑堅珉環一室聚之竒觀也余昔仕潤暇時登覽終日摩挲寒江夜虹英靈光彩猶歴歴在心目此二帖嘗見之英光堂今堂莽為荆棘石化為瓦礫陳迹不可復尋矣二帖有物䕶持猶為人所寳誰謂石之夀不如楮墨之能不朽耶攬之一嘅荆溪蔣岩書真蹟米南宫墨蹟引首紙北固火後作一閤前見黄鶴羣仙捧珠勢乃芾家山也僧要名命曰寳珠閤題曰對檻青山露全體佛性羣仙捧寳珠求遺如起定罔明起如子定象罔是文殊全體俱見無失無得象罔但作文殊罔明亦無所措焦山銘水清石白焦公之宅妙道孰測能語而黙俟河之清乃通帝夢殖殖瑶壇萬靈是擁眄馨逺謁以祚道宋公徳不葷客必蓐素擁徒繁御必以風雨明德感神神應可呼勒銘津塗以肅薄夫呉人善理砧惡楮化為美其他亦倣此苐未知之耳右四紙元章為書畫學博士書于國子監時崇寧丙戌秋七月也右雜文并詩先臣芾真蹟臣米友仁鑒定恭䟦趙子昻淺絳色紙本畫一軸全師董巨上有詩云秋風落葉到衡門怪底窮林笑語溫淮海維揚憶耆舊小山桂樹著王孫清詩望見詞鋒避餘子驚將氣岸吞樵青不識城中路短轅何處謝髙軒子昻莫廷韓蔵趙子昻香山避暑瀟湘夜雨二圖黄子久秋山亭一圖皆元人中之錚錚者畫上皆有廷韓印識見即可辨李成寒林平野圖按此條已刻書畫舫今刪唐顔魯公書誥按此條已刻書畫舫今刪顔清臣與明逺手帖硬黄紙行書較之自書吏部尚書告尤為風韻今在餘清堂中亦云唐人墨蹟不易得者然余細辨之實張伯雨臨本非真蹟也蔡明逺鄱陽人真卿昔刺饒州即嘗趨事及來江右無改厥勤靖言此心有足嘉者一昨緣受替歸北中止金陵闔門百口幾至餬口明逺與夏鎮不逺數千里冒涉江湖連舸而來不愆晷刻竟達命于秦淮之上又隨我于䢴溝之東追攀不疲以至邵伯南埭始終之際良有可稱今既已事方旋指期斯復江路悠緬風濤浩然行李之間深冝尚慎不具真卿報後有王穉登䟦不及錄晉陸機平復帖按此條已刻書畫舫今刪王右軍此事帖按此條已刻書畫舫今刪王右軍謝司馬帖按此條已刻書畫舫今刪趙文敏攀鞍圖卷全學唐人印款並全今在韓太史家趙松雪紙本秋林落葉圖全仿董巨為真無疑周昉並馬圖計人七馬四絹本大著色本身有聊城喬氏二印八駿飛騰誤穆王聯鑣禍水溺明皇淋鈴雨奏郎當韻可憶歡生墮馬妝天啟癸亥菊秋十二日金陵朱之蕃題董𤣥宰評畫畫家以古人為師己自上乗進此當以天地為師米元暉自題畫卷云墨戲得之瀟湘竒趣及居京口時以秋早過北固觀烟雲變態是處江海空濶羣峰與濤頭相吐吞致足取為畫境又曰宿雨初霽曉烟未泮正是吾家粉本也子昻嘗詢錢舜舉曰如何為士夫畫舜舉曰𨽻法耳𨽻者以異于描所謂寫畫須令八法通也元人以米元章父子與髙房山侍郎為士夫畫然倪元鎮又當為米顛配享雖功力不同逺韻則一大都元季皆以董巨為師如姚彥卿唐子華學郭河陽者不復能與逸品爭長矣偶閲舊作評畫語書此董其昌余嘗欲和㑹三趙畫為一家三趙者趙令穰千里子昻也宋諸王孫皆富有古人法書名畫子昻為承㫖都下借珍圖手摹之或時令胡廷暉輩代摹故其為山水無一筆無來處若寒乞之人自不辦此昔人評趙大年畫以為得胸中有千卷書更奇又每作山水圖來人戲之曰又是上陵回也大年以宗室不得遠游故云不行萬里路不讀萬卷書看不得杜詩乃知畫史亦大未易董其昌書真蹟米南宫真蹟硏山銘五色水浮崑崙潭在頂出黒雲挂龍怪爍電痕下震澤極變化闔道門後題云寳晉齋前軒書子于都下見真本及研山圖隨宋元人題䟦甚衆見楊儀驪珠錄真蹟日録卷一
