  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0056_WYG_002-1a, image: WYG0817/WYG0817-0531a.png}
body:
  text: 真迹日録卷二明張丑撰項氏祕藏虞永興夫子廟堂碑真迹係宋人臨寫非真迹也謹按南濠居士文跋止有永興公奏草真迹其詞云右唐虞世南奏草真迹中云伏蒙聖慈以臣進呈孔子廟堂記石本特賜臣晉右軍王羲之黃銀印一顆臣已祇受蓋在貞觀七年十月後有宋人題名及賈丞相悅生印今藏宜興徐氏乃閣老公故物也世南所書廟堂記豫碑跋中嘗及之但羲之有黃銀印及太宗以之而賜世南此皆後人之未知者故表而出之唐六如畫扇畫法全出荆關蓋中年之筆作淺絳色皴紋極少蕭疏淡蕩而又極秀潤足稱用意神品左方題曰百畝家田號上腴五車遺業舊鈔書不知世外秦亡鹿且喜盤中食有魚唐寅畫并詩贈上茂化尊兄教之又見六如紙畫一幅全倣黃鶴山樵與常見者另換一番眼色題云秋林清賞吳門唐寅畫其印曰伯虎亦一竒品陸叔平真迹壬申端陽日得見徐熙丹粉花枝包山陸治曰能品也未為天造庭有二葵因試為之遂題曰姿態丰神總一機不因丹粉諦生輝無人識在驪黃外却笑孫陽買骨歸真迹李西臺千文卷按此條已刻書畫舫今刪趙幹江行初雪圖按此條已刻書畫舫今刪王右軍思想帖按此條已刻書畫舫今刪李嵩工作圖巨幅絹本淺絳色筆法髙古又錢選飲飼圖設色長卷人馬皆有生氣乃韓太史存良之故物也錢舜舉臨陸探微金粟如來像卷按此條已刻書畫舫今刪夏禹玉山水長卷卷髙二尺餘其長五丈有竒絹本淺絳色收藏得地可喜卷前署曰江山平逺西湖春雨廷暉筆也畫前有許氏廷美圓印松皋清玩方印卷尾小楷云臣夏圭進書畫皆屬真筆無疑設色尤古所之者士氣耳覆閲前卷的屬戴文進筆其稱臣夏圭進亦傅會耳圎澤三生圖二卷趙千里圖其前生劉松年圖其悟前生並屬真迹惜人物皆大丘壑趣寡一藏吾郡韓太史家一藏松江莫雲卿氏王敬美皆有跋惜未得合為一處亦可歎也韓氏藏曹弗興桃源圖按此條已刻書畫舫今刪懷素夢遊天姥吟卷真迹按此條已刻書畫舫今刪閻立本西域圖藏吳廷所雖舊而未必真然海濵逐臭之夫亦頗有稱賞者觀之噴飯滿几唐十八學士圖神品五代周文矩十八學士圖宣和畫譜載丙寅九月草日董其昌觀唐十八學士圖瘦金書有唐至治詠康哉闢館登延經濟才雍泮育賢今日盛彚征無復隱蒿萊御筆唐十八學士杜如晦房玄齡于志寧蘇世長薛收褚亮姚思廉陸德明陸元明字德明孔穎達李元道李守素虞世南蔡允恭薛元恭薛莊字元恭顔相時許敬宗蓋文逹蘇勉蘇名旭或名朂此稱勉儒林華國古今同吟咏飛毫醒醉中多士作新知入彀畫圖猶喜見文雄大觀戊子歲御筆唐太宗得杜如晦房玄齡等十八人佐命興邦臣考其施為皆不能稽古立政然終致其君至太平者蓋唐乘大亂之後飢易為食渴易為飲故事半古人功已倍之也太宗嘗曰秦漢不足襲三代損益如何房杜不能對遂命魏正與玄齡等宿中書省講議終不能定太宗曰禮廢樂壞朕甚閔之有志不就古人攸悲對曰非陛下不能行乃臣等無素業何愧如之正與玄齡如晦慚栗而出玄齡等相謂曰有元首無股肱誠可歎也蓋玄齡如晦學非堯舜三代其所操知秦漢蹇淺卑近使太宗無鄉舉里選制禮作樂之功後之學者未嘗不掩卷太息今天下去唐又五百餘歲皇帝陛下睿智生知追述三代於是鄉舉里選制禮作樂以幸幸字誤當作教天下足以誇唐越漢猶慨然緬想十八人圖其形寄意於詩什有雍泮育賢今日盛彚征無復隱蒿萊之句求賢樂士可見于此則成人有德小子有造當如聖志十八人不足道也大觀庚寅季春望太師魯國公臣京謹記真迹卷細閲十八學士的係宋徽宗筆元宰題為文矩畫非也宣和譜無此目敏仲擕示王居正紡車圖卷人物全倣周文矩所畫四人面色如生曲盡村姑村婦兒童情態原係賈秋壑故物卷尾印識具存可寶也趙子昻凡再跋國初在袁栁莊家吳原博題識甚詳皆真迹云是日所示宜為最其次則張即之書杜陵古柏行卷絹本學顔趙子昻楷書圭峰禪師座右銘卷高頭大字後有柯敬仲李衎張天英等跋張來儀懷友詩圖卷詩凡草三首蓋為吕志學寫者詩前有短圖文夀承為之題署跋尾又有朱子儋印記皆真迹也宣和書譜所載共一百九十八人又四國一千二百二十帖宣和畫譜所載共二百三十一人六千三百九十六軸通計七千六百一十六件也越國夫人王氏端獻王頵之室善寫墨竹作篆𨽻有古法見書史會要內右軍大道帖按此條已刻書畫舫今刪越石示吳道子旃檀神像絹本大著色前有宋徽宗瘦筋書標題雙龍方璽并宣和政和內府等印雖破碎而神明煥然本大護法神之一文震亨跋為護諸童子經相非也韓君博示余褚河南倪寬贊是宋世臨本後有趙子固等七跋却真按登善倣效伯施而本身字體全出歐陽信本是一證也中間板築飯牛之朋朋字誤為明字是二證也又紙質鬆而白係宋代精楮唐無此物是三證也近吳原博題為夏憲副藏本見家藏集中不應遺此一跋是四證也卷向藏韓存良太史家存良收蓄褚書千文是無上神品而不悟此贊之偽亦食而不知味者也近聞得百千歸之虞山嚴氏號曰真褚公筆丑定為思陵臨寫無疑登善有靈必以余言為然耳或云此帖乃唐宋御府官本故紙質如新中間朋誤為明係進呈書不復更定容再詳之沈啓南雪館情話圖詠與文徴仲雪夜聯句圖卷並在韓朝延家寶晉集十四卷陳氏曰禮部貟外郎襄陽米芾元章撰其母閻氏與宣仁在藩時有舊故以后恩補試銜入仕其上世皆武官蓋國初勳臣米信之後也視芾為五世孫酷嗜古法書家藏二王真迹故號寶晉齋文獻通考雲麾將軍碑丑按雲麾將軍碑有二一為李秀一為思訓並授雲麾將軍而兩碑又皆李泰和書故相混耳草韻原本十册金人張天錫趙昌世所撰亦一竒籍可寶藏也鮮于伯機小楷師鍾元常韓君啓藏李唐風雨歸舟卷絹本淺絳色烘染極佳人物差大後有吕志學黃鉞二跋亦太史存良公之故物也晉右將軍王羲之書大道帖按此條已刻書畫舫今刪吳道子著色天神卷吳道子旃檀神像徽廟瘦筋書神品上泥金書嚴分宜家關防半印近從吳廷所歸之王越石真迹倪雲林絹本山水小幀一全倣董北苑筆法乃董玄宰公故物也上有人物舟船當為格外竒品今録其題詠于後藹湛佳樹陰清露夜景沈悄然羣物寂髙閣似陰岑方以玄默處豈為名迹侵法妙不知歸獨此抱沖襟齋舍無餘物陶器與單衾諸生時列坐共愛風滿林袁員外常愛誦此詩因作此圖以贈至正四年十二月望日倪瓚寫余作此圖時年四十嵗矣庚戌正月七日為余初度之辰孫渚王君彥輔訪余于其親戚思明家之停雲軒中具酒饌肴核之餉以為壽且出此圖相示展圖恍然如夢中事也因詩以識其慨歎云仙翁已去白雲鄉踏雪飛鴻迹渺茫留得王喬為我夀白鵝珍果九霞觴是嵗余年六十五矣瓚巋然傑閣溪之湄佳樹鬱鬱生華姿秋髙天濶爽氣合林光蕩潏山雲低古來董李稱妙筆意匠經營自天出倪君範之思入神前後驅馳聲赫奕蘇州刺史詩趣高清名萬古不可招前朝又有袁閣老況奈泯沒俱寥寥彥髙有此非虛得城市山林本同域行當結屋向巖阿與子長年共泉石雲灘王朝臣按雲林墓志洪武庚戌時年政七十矣而云六十有五深所未解苐此幀的屬贈思陵先府君之作傳授有緒不應出此逗漏也豈元鎮志銘或有誤耶雲林年六十九卒續按公本集詩題有乙未嵗余年適五十之句則志銘之誤無疑而此幀為得其實矣雲林晚自號曲全叟一女適徐瑗贈范壻七律一首又有别陸氏女七言絶按以下似有闕文倪雲林溪山仙館小幅按此條已刻書畫舫今刪王維圓光二水後有馮子振趙世延王約李源道袁桷張圭鄧文原陳庭實栁贇陳皓李泂杜禧趙巖十三詩魏必復一跋皆奉皇姊大長公主命題實至治紀元也按元運方隆皇姊雅尚文學一時名公巨儒以文章翰墨寵遇當世其盛蓋可想見也右丞畫水人間少今向皇家見二圖想象解衣盤礴處應須價重日南珠集賢大學士趙世延題大學士趙世延與王約同銜篆書要詩中見右丞畫意圖怡顔而作雪景者何志明潔也彥卿盤礴自有深意存焉不似今人之漫興耳左方記文出正學方公手筆其題名處姚氏以忌諱去之此如誕嘉猶子所收米芾跋張旭公孫帖卷後有建文壬午題識削去年號同例夫成祖立法之嚴如此而方公書迹終不至泯滅者天也非人之所能為也裝成謹録藏之以告同志云爾時崇禎改元夏五米菴張丑青甫書真迹條按此前疑有闕文餘清堂藏右軍遲汝帖是唐模本紙色頗晦而墨采動人亦名卷也又藏唐人絹本臨東方朔畫像贊本身有米芾題識一行惜破損處多然不失為名帖也劉原父侍讀所書莊子秋水篇丞相魯國文定王公家藏物妮古録顧光祿有唐人兄妹共寫法華七卷細如蠅鬛後題云燕子女丁問之無能知者楷法甚精宋髙宗御書序文一首前有斷簡後稱臣稱名蓋御製徽宗御集序也顔太史鹿脯帖真迹較宋拓本不唯字形大小不倫乃其文亦小異宋拓故自不足據也十七帖清晏嵗豐又所使有豐一鄉故自名處豫極不解豐一鄉作何語及得髙麗刻本乃云所出有異産讀之豁然因知王著但憑倣書入石耳其昌懷仁聖教序真迹跋古人摹書用硬黃自運用絹素此卷首有宋徽宗金書縹字與內景經同一黃素知為懷仁一筆自書無疑書苑所云雜取碑字右軍劇迹咸萃其中非也黃長睿書家董狐亦以書苑為據恨其不見真迹輒隨人言下轉耳董其昌此書視陜本特為姿媚唐時稱為小王書若非懷仁自運即不當命之小王也吾家有宋舍利塔碑云習王右軍書集之為習正合余因此自信有會其昌又題龍眠山莊圖水芝亭發真塢發真薌茅館瓔珞巖棲雲室祕金菴延華洞雨華巖泠泠谷玉龍峽觀音巖垂雲沂古栁其大十圍在建德館南三百步寶華巖自間得此圖于雙溪一故家蹙為故紙豫見其筆墨縷細遂取之置于書篋殆二十餘年漫不省視大德甲辰嵗雙巖鄭學士訪我靈源見而異之曰此殆李龍眠山莊圖草也亟為整緝其背紙摺縫處元有朱書次第遂為成書故表而識之爾為他日好事者鑒賞是嵗九月既望日雲屋往年備官京都從吳興公入道山延閣書題裝潢畫卷見王摩詰輞川圖草後又見圖本郝參政家有四川宣撫司都大茶馬司官印位置纎悉具備公肻首玩賞顧豫言曰蘭亭序草為古今書法所宗正若此耳此龍眠山莊圖草全用其法而行筆細潤乃有超越之意古人翻案法正當于此求之重紀至元之三年秋九月十又九日栁貫訪百丈和上靈源山中因題龍眠山莊圖絹本余見其二一為沈元初明府一為吳康虞太學所藏皆非真本蓋龍眠自運則用澄心堂紙臨摹則用絹素也惟余家蓮社圖為龍眠得意筆又有盧鴻草堂圖雖命之鴻實龍眠以意造及觀此卷益信矣龍眠又有定林蕭散圖與此卷同一筆法蒼古變幻的傳山水之神覺趙吳興猶有取妍之態少避伯時也董其昌題豫幼侍先君及黃侍講訪東陽志巖二兄弟于智者之草堂嘗示清溪圖五軸有蘇子瞻秦少遊及鄉先達諸名公題識而此圖罕出者豈不以彼勝此哉吾觀此殆過之李公麟熙寧中名進士王安石深敬其人仕三十年未嘗一日忘山林當時論者謂其文章則追建安書法則宗晉宋人物之畫則效顧陸創意如吳道玄蕭灑如王維此圖正本藏在宣和御府可以對輞川圖是也逺師慎藏之洪武丁卯正月望牧羊山樵題馬和之學李龍眠只此卷一轉筆為螞蝗抅便有出藍之致然如糟之成酒其味不及矣其昌真迹王維蘭亭玩鵝圖後有趙子俊跋又倪雲林秋林讀書圖卷元人題詠極多並在嘉禾髙氏謝莊希逸小楷詞翰真迹凡四篇清婉媚好宋思陵書法所自出也舊為賀方回藏本米元章故物也今在汪景淳處戲鴻堂帖刻手不精略存梗概耳王元美尚書家藏宋梓書籍以萬卷計就中絶世奇觀當以班范二史為之冠其次莫如唐李善注文選無論紙板刷印之精頡頏二史即其收藏得地如未觸手者亦非他書可及苐內中諱字極多如旋廓等字例闕一筆未知作何避諱耳記俟再考又見雲間顧氏所藏宋內府板史記一部紙墨與元美家漢書一類惜其家索價太髙不售而返至今尚在夢想曹重甫家宋板李太白集一部是元豐三年刻用紹興間門狀紙背印每本有雲林倪氏家藏圖書末具趙雍題名二行乃崑山六觀堂藏本沈辨之故物也雖經點汙亦自可喜又吾家有陶淵明集二册是東坡手書入梓尤為可重耳黃山谷真迹兀然無事無改換無事何須論一段直心無散亂他事不須斷過去已過去未來何用算兀然無一事何曾有人喚向外覓工夫總是癡頑漢糧不畜一粒逢飯但知噉世間多事人相趁渾不反我不樂生天亦不愛福田飢來一鉢飯困來展腳眠愚人以為笑智者謂之然非愚亦非智不是玄中玄要去如是去要住如是住身披一破衲腳著娘生袴多言復多語由來反相誤若欲度衆生無過且自度莫漫求真佛真佛不可見妙性及靈臺何曽受薰鍊心是無事心面是娘生面劫石可動搖個中無改變無事何須讀文字削除人我本冥合個中意種種勞筋骨不如林下睡兀兀舉頭見日出乞飯從頭􅀈將功用功輾轉冥蒙取即不得不取自通吾有一言絶慮忘緣巧説不得只用心傳更有一語無過直與細極豪末大無方所本自圓成不勞機杼世事悠悠不如山丘青松蔽日碧澗常秋山雲當幕夜月為鉤臥藤蘿下塊石枕頭不朝天子豈羡王侯生死無慮更復何憂水月無形我常只寧萬法皆爾本自無生兀然無事坐春來草自青元符三年七月涪翁自戎州沂流上青衣草四日宿廖致平牛口莊養正置酒弄芳閣荷衣未盡蓮實可登投壺奕棋燒燭夜歸此字可令張法亨刻之宋黃文節公庭堅正書法語真迹項元汴家藏神品珍祕嘉靖四十五年得于吳門黃氏原價一伯金右帖髙尺許長五丈竟一紙也質如冰繭色澤如玉目中罕睹云前段字迹大可徑寸計七十六行自元符以下每行草一字作擘窠大竒大竒按此迹見于汪氏珊瑚網者文與此同凡四百二十一字後有李日華汪珂玉跋而無項氏題識汪跋云在宋楮上禇髙尺餘長二丈絶無接縫其見于江村銷夏録者係古色青襴箋高七寸八分長一丈二尺五寸紙計七接無此字可令張法亨刻之九字故祇四百十二字本身有董文敏題識亦無項氏題語所列圖記亦與此逈異今青甫所見紙長五丈竟一紙是三家所見各各不同甚矣鑒别之難也乾隆丁亥十二月朔天都鮑延博附識黃文節公草書談道章帖計十段每段題目本色書其詞俱倣懷素體墨彩如新精神煥發苐卷尾略有塺汙處亦小疵也黃涪翁草書廉頗傳全學懷素亦在項子京家米南宫易説真迹易曰天數五地數五五位相得而各有合此五行生成之數洪範曰五行生數天肇一於北至陰之所陰極生寒寒生水故曰北耦二曰南陽之所也陽極生熱熱生火東陽中也陽散而生風風生木陰止以收而生燥燥生金金中央也陰陽之所交者也陰陽交而生溼溼生土所以成變化而行鬼神皆不出乎此夫體立而後成性以至稼穡皆五行之性也性定而後辨味皆五行之味也水物至陰其性流溼故江淮失五六字於山不若海之下故惟潤下所以指名之也五行聲色臭味而此獨舉味者人之所待以生養者特味為急故也元符元年春二年夏三年秋遊中天竺訪堂頭禪師紹聖四年同佛印訪禪師師已垂年苦留心於易芾遂贈其易義并大書讀易堂三字併遺之襄陽米芾元章書讀易堂篆書大字豫觀米襄陽為天竺大士書易義數語深得乾造坤化之奧世每以能書稱襄陽而其學識乃如此豈知米公者哉蘇君昌齡請篆讀易堂三字以補其闕用鎮山門遂書于左方鄱陽周伯溫識後二百六十一年當大元至正十五年三月朔旦也米南宫于書無不讀生承平時以絶倫之資日接賢士大夫緒言餘論故其造詣益深使其僅能字學則當時諸賢豈肻前席也世言王右軍能書而已殊不知其卓識偉見貽書殷深源勸其交歡桓溫使深源從其言則溫不至于跋扈而晉室尚可以扶持襄陽豪逸乃肻與佛印同訪中天竺至為之書讀易堂豈以少林指心單傳固與羲皇周孔元無間耶襄陽論易以及於洪範五行五位五性五味然所謂五行其五味人皆可知獨金曰從革從革作辛辛為辛辣使以金銀銅鐵百計鬻之不能辛也此雖細事然子朱子門人固嘗以為問終不能析其為何如今已矣恨不能起襄陽于九原而質之吳人李君士明寄迹老子法中而嗜古好學出此卷以求題故粗書襄陽之為人而非敢及於讀易也宋米元章行書易説帖名賢題識項子京珍祕其值三錠真迹江按此迹亦見村銷夏録本文題識與此無異惟項氏標題其值三錠作其值六錠少不同耳廷博附識宋哲宗批答韓儀公忠彥辭免表臣忠彥言伏奉制命除臣太中大夫知樞密院事􅈴封食實封如故者無勞備位方深譴黜之憂增秩正名忽被褒升之寵內循忝冒實靦靣顔輒瀝愚誠仰干睿聽臣忠彥誠惶誠懼頓首頓首伏念臣材謀淺陋術學迂疏偶玷主知浸塵世職自擢陪於大政遽易處于內樞坐閲嵗時已積妨賢之愧寵踰涯分常虞瞰室之災比貢囊封懇辭柄用屢瀆蓋髙之聽未推從欲之仁勉策疲駑上酬眷委會弼臣之並進緣舊物而不遺然今邊候未寧廟謨無補宜改圖于碩輔當自劾于非才更此超踰豈遑安處伏望皇帝陛下廓乾坤之大度回日月之餘光垂矜非據之誠特寢已行之命則臣無虛受豈惟素守之獲全賞不失勞實亦羣言之為允臣無任俟命激切屏營之至謹奉表陳免以聞臣忠彥誠惶誠懼頓首頓首謹言元祐七年六月日太中大夫同知樞密院事上柱國南陽郡開國公食邑一千五百户實食封四百户賜紫金魚袋臣韓忠彥上表省表具之懋官所以崇有德正名所以重本兵方資帷幄之籌用弭邊疆之患乃崇位貌以廣威聲宜恢宏逺之謀勿事逡巡之禮所請宜不允仍斷來章賜忠彥真迹實後有六世孫澄甫跋并韓氏始祖事洪武中裔孫廷可書俱不及録閻立本王會圖絹本大著色前後凡草四國每國標題字頗拙朴不入真賞後有康里子山等三跋周文矩文會圖卷尺許短幅止畫學士四人侍從三人屏障作細山水極古後有柯九思偽跋又見臨本陸探微薑后免冠進諫圖後有王仲至跋近時文休承題識甚詳即米元章畫史所載者又見懷素聖母帖粉澤紙書真迹也又見李龍眠石勒參禪圖後有大安年間宫昌跋其所書細花紵絲目中罕睹按參禪圖云云已見前又李伯時臨衛協髙士圖筆法髙古惜絹素稍粗不入巨目賞玩耳梅花道人草亭詩意一卷畫倣巨然僧純用淡墨圖寫左方題五言詩一律而署名稱梅沙彌亦甚竒特後有啓南古詩題詠備述畫學源流攀元提巨真不誣也文太史畫卷題云叢桂齋圖徴明為子充作卷前𨽻署亦太史書其畫全倣荆關作淺絳色亦甚可喜後有顧鼎臣黃雲周恭顧潛方鵬方鳳等詩皆為鄭氏作者真名迹也鄭子登雲戀舊丘手攀藂桂且淹留飛騰早奪垂天翼對策明光作壯遊安里張禎又聞仇英逺村圖卷在王氏堪與東林圖卷相伯仲唐子畏絹畫山水四軸作淺絳色雖真而從周臣家法所謂行家兼利者也今録四詩于左風聲逺振千山樹天影低垂百尺臺況有杏花村裏酒詩鞍那得不長來唐寅楊栁陰濃著地垂泉聲汩汩日遲遲村翁早自攜壺至來問輸贏昨日碁唐寅青藜拄杖尋詩處多在平橋山徑中紅葉沒鞋人迹斷野棠花落一溪風唐寅冬深木落碧山空寒勒氈裘閶闔風猶試尋梅溪上步一壺相伴任西東唐寅畫真迹唐六如淺絳色紙上山水一軸阿對泉頭舊布衣對談霏屑入玄機悠悠盡日無人到一樹桃花隔翠微唐寅畫又六如林屋洞天小幀係早嵗筆細潤之極在嚴道普家余所見漢玉印以劉先臣印為最白起忌僕韋成慶次之張聖廖由王昌馬姬之印尹須印信黃神之印天帝之章皆極品也周敏仲按别本作王越石攜示周方鼎一高四寸五分方三寸廣二寸約重二十兩四面花紋作天雞夔龍四足有細花周圍飛戟八條三面青緑翡翠其一面與內方底面皆作水銀古款一行曰作孟姬三字竒古生平所見鼎爐宜為冠是日又見王越石按别本無王越石三字王叔明南村草堂一軸紙本淺絳色筆法清逸脫盡畫家蹊徑真絶品也此圖為班彥功作當與周敏仲處大癡老人九峰雲霽同觀按别本無當與周敏仲云云數語沈啓南落花圖卷全詩三十首不録右詠落花詩三十首宏治辛酉三月下浣書于東禪精舍長洲沈周真迹仇實甫畫項藎臣諱忠賢勞圖前後凡十三段全法宋名家惜其僅畫一人一家之事故不為世所知其品實出中興瑞應圖上人物山水旗幟軍容種種臻妙仇實甫帝王道統萬年之圖凡草幀其目曰伏羲始畫八卦曰神農藝榖嘗藥曰黃帝衣裳神化曰帝堯欽若敬授曰帝舜誕敷文德曰帝禹隨山刋木曰夏啓鈞臺會享曰成湯至德祝網曰髙宗夢帝賚弼曰石稷稼穡有相曰文王惠鮮懷保曰武王訪箕陳範曰成王卜洛定鼎曰漢髙帝過魯祀孔曰漢文帝親耕籍田曰漢光武詔封褒德曰漢明帝懷逺祥應曰唐太宗命講孝經曰宋太祖洞開諸門曰宋仁宗屏書無逸王希文出示郭恕先避暑宫殿圖絹本小立軸樹石秀潤界畫尤精原係宣和御府四圖之一乃黃琳國器故物而為濟之閣老所購足稱無上名品惜舊籖題已亡并失文太史題頭縹或更曰荆浩秋山樓觀圖李成山腰樓觀圖皆傅會耳周敏仲示王叔明絹畫一幀款云天香書屋圖至正改元秋八月香光居士王蒙畫其畫作淺絳色精工之極猶書家之楷法也又示十洲西園雅集濶幅一題云仇英實父為懷雲先生倣古其畫不惟樹石髙古人物皆有生氣較閲此等製作神情開爽軒軒豪舉亦何必古人邪王右軍思想帖按此條已刻書畫舫今刪惠崇江南春圖紙本小袖卷清逸之極不讓顧逋翁手筆今在王氏董玄宰太史極稱許之自非莊列髙風可擬議也王齊翰挑耳圖卷按此條已刻書畫舫今刪題張長史春草帖真迹右張長史草書春草帖鋒穎纖悉可尋其源而麻紙松煤古意溢目真足為唐人法書之冠晉迹不可復見得見此迹其末世之希世珍乎顔平原書家之集大成者猶言杜詩韓文顔法亦出于此也因與袁君子英獲觀陳彥廉氏歎賞竟日壬子人日倪瓚題真迹宋王居正紡車圖紡車圖故宋王居正筆周天球書王居正拙之子也俗以其小字呼為憨哥學丹青有父風師周昉士女略得其妙嘗于苑圃寺觀衆遊之處必據髙隟以觀士女格態凡欲命筆則澄祕思慮故於形似為得右聖朝名畫評按王拙河東人也大中祥符間父子以畫馳名海內延祐四年豫客燕都有持此卷相示者因以五十金購之乃賈師相故物也圖雖尺許而氣韻雄壯命意髙古精采飛動真可謂神品者矣是嵗中秋日松雪道人趙孟俯識春風楊栁色麗日何清明田家作苦餘軋軋繅車鳴母子勤紡績不羡羅綺榮童稚嬉自樂小尨恬不驚緬思全盛日萬物遂所生王郎稱好畫奕世垂佳名詎意劫火餘留此天機精千金匪重價至寶那可輕暇時一披閲邈焉起遙情後二年四月三日重題右宋王居正畫紡車圖元趙文敏公題詠于後人間至寶珍重珍重南昌袁廷玉書可愛河東王氏子丹青馳譽動祥符不傳羅綺遊春態只畫茅簷紡績圖王居正紡車圖有補于風俗而趙子昻學士題詠詞翰兼妙可謂三絶矣是卷國初為袁栁莊所得翰林楊維新與袁有聯遂購于袁氏暇日示寬求題漫賦一絶如右長洲吳寬真迹趙子昻正書玄妙觀三門記跋熟視李北海嶽麓寺碑乃知此碑之逼真猶是集賢偏師耳董其昌題越石於天啓之元得文敏所書殿記於清溪曹起莘家展至後段覺語脈齟齬深以為惑後三年又得三門記於五茸何氏閲之乃悟其首尾互裝向非越石嗜古徇竒遇即收之則延津之合難矣文敏此書有泰和之朗而無其佻有季海之重而無其鈍不用平原靣目而含其精神天下趙碑第一也不易得不易得崇禎己巳秋日東吳李日華鑒賞家謂玄妙觀碑酷似李北海嶽麓碑若見蘇靈芝鐵佛寺刻彌見松雪翁書學來歷此卷精彩可照四裔更勝吾松林亭碑也陳繼儒題真迹韓氏藏明皇夜遊圖卷一凡為人四十有四馬十有一通用絹三幅其長一丈有咫靣相雖屬平平而衣紋馬匹器具古雅有非唐人不能為者按雲煙過眼録云蘭陂趙與勤所藏有張萱虢國夫人夜遊圖即此卷也其前與明皇並馬者楊太真也其後二婦女同乘者中間虢國夫人也存良太史題為吳道子畫恐非又按采真子畫鑒云周古言畫在周昉之下文矩之上有夜遊圖傳於世張萱工仕女人物尤長於嬰兒在周昉之右平生凡見十許本皆合作所畫婦人朱暈耳根以此為别覽者不可不知也今觀韓卷其真是耶唐人畫明皇夜遊圖張萱秉燭春遊銀燭光搖明月午彩仗星辰啓朱户天街按轡雙龍駒唐皇注盼楊妃嫵曼睩蛾眉緩不前嬌姿次第取君憐宫女同時憎粉黛胡兒侍間拾嬋娟雲髻花鈿耀銀漢香飈繚繞青霄半昭陽専寵暗徘徊團扇追歡影凌亂清夜遊蹤樂未窮秋風漸入九成宫日冷金扉凄蕙草太真轉炫新妝紅吁嗟兹事已千載馬嵬落日沈光彩道子覃精驅鬼神一幅丹青奪真宰我對蘭燈拭匹練何如揮翰金鑾殿艷物猶然有生色叱之使捧琉璃硯禮卿學士長洲韓世能存良甫題真迹展子虔春遊圖按此條已刻書畫舫今刪鮮于伯機題董北苑山水按此條已刻書畫舫今刪鮮于伯機題趙模本拓蘭亭後按此條已刻書畫舫今刪楊載題趙千里山水扇面歌公子丹青藝絶倫喜畫江山上紈扇祗今好事購千金四幅相連成一卷春流漠漠如江湖飛煙著樹相有無嵐光注射翻長虛白玉盤浸青珊瑚追隨流俗轉蕭疏對此便欲山林居旗亭花發酒須沽舟行為致雙提壺抱琴之子來相須醉歸不省何人扶旁有飛泉出簷隙掣電飛霜相蕩激蛟龍不受鯢桓食但見垂綸古盤石人生萬事無根柢出處行藏須早計一丘一壑倘如斯便可束書從此逝君不見鄭子真躬耕谷口垂千春毫芒勢利能沒身汝胡齷齪為庸人元音米南宫手柬裹鮓一卷奉納公所模遍尋不獲小兒宿同文無處詰必亂與人也見追懊不已此軸若要願却模一本見與可也龍石獻友晉芾白芾頓首再拜提刑郎中丈節下稍違左右詹企實深秋序向涼恭惟澄清多暇尊候起居萬福芾即日蒙恩即承教下情傾馳專介上狀布誠不宣芾頓首再拜提刑郎中丈節下寶晉齋帖海嶽遺迹龍團歌瀛師謝公之所惠大如車輪輕如紙磨而試之黑過漆元非本約重違意寒雀比之立憔悴道寧萬一歸于彼不督芙蓉乃恕耳三木模研理固異耿墨比此天與地開匣付介驚欲墜惜之不得幾下淚君匣鄂州便可碎只留承晏使執侍黻呈不扣古謂之連珠此是也黻叩頭適有煩聒悚悚江南竹禽一對奉獻以充送行貧居乏佳物必多相亮也専此不次黻頓首仲永朝奉兄鷺景來日定之崇寧二年元宵前都下與盧平父觀燈預賞聞歌此詞字多訛舛今特為校正其詞名賀聖朝襄陽米芾元章書太平無事四邊寧靜狼煙喜國泰民安堯年舜日萬民樂業嬉笑矚景龍門上御燈鳳燭輝照教坊進鈞天妙舞藝人巧葆􅀢宫前賜御篆斷妖艮嶽旁邊御爐深處映蓬島笙歌奏吾皇不疾等元宵景色來到恐後月陰晴未保先禮部真迹也乃遺佛印禪師筆法輕清蕭灑欽仰恭愛世當寶之敷文閣直學士右朝議大夫提舉佑神觀友仁謹跋今日獻汲相國紀慶生申祝夀訴衷情輒録呈芾頓首再拜薰風吹綻云云長年頌德紀慶生申鷓鴣天芾頓首再拜暖日晴烘云云老人跋鷓鴣天詞先子禮部紹聖中撰此樂章以擬汲公相國眉夀乃所遺草真迹也又有其詠梅兩絶句云姑射真人自少羣要親髙節許交君一臺二妙逢清賞甘遜佳名得致榮江頭盡醉似泥何管領仙姿酒醟多煙艇兩三橫岸處惜花佇立想凌波敷文閣直學士右朝議大夫提舉佑神觀友仁謹跋王右軍破羌帖按此條已刻書畫舫今刪陳閎十八學士春宴圖跋唐文學館十八學士春宴圖相傳為陳閎筆閎會稽人開元中仕至永府長史人物之妙幾與閻右相爭衡余前在王厚伯處見唐人所畫蓮社十八賢像風流位置正絶相似其為唐人名筆無疑林泉紱冕各自不同觀此亦足以想見一時風尚也空青老人曽紆題梁園碧筠瀟湘玉小山叢枝綴金粟天公驅龍耨秦土移入秦王天册府虬髯主人馬上客手摑中原血華赤藝氛霏霏講初罷獅子驄頭散鞭喏軟羅半臂春風偏十八奚駒嘶紫煙玉酥宫痕纎月甲銀甕戈書小黃押大槽亂拍珍珠流蒲萄就暖沈香蚪琵琶掩瑰鵾雞促聲聲破陳秦王曲羲輪半舂啓明曜萊公起舞密公笑就中小薛醉傀俄龍門老師奈若何太子宫前演雞戟銅馬時時齧荆棘諸君詰朝且虛左雋州流人來上坐安陽李彥廣過豫弇山園登萬卷樓觀彛器圖史因出示唐人所畫十八學士春宴圖且索題語木落霜髙天風凌厲豫且被酒矣走筆短賦因以歸之風流盛事又在今日吟樽清影中也琅琊王世貞記真迹顔魯公與兄帖真卿乞憐天聽上恩好生未忍誅戮已得西峽之命趨生無路死可向也吾門誓以忠義傳家兄當憤發使宇宙清廓死無憾耳不得一别深惘然珍重不具真卿白常山太守兄左右魯公書世傳祭藁爭坐帖送蔡明逺及乞米帖皆石刻本此獨真迹奕奕有神顔書甲觀也董其昌題真迹王朋梅奉教作金明池圖按此條已刻書畫舫今刪題金明池圖卷後金明池畔孤雲畫玉行間多士詩六要四聲歸帝子細推冥想作吾師米菴張丑真迹逸按此詩書畫舫所補刻于此宋阜陵紅橋鸂鶒圖禁籞龍翔池汪洋清泚匝岸手可俯掬故水鳥來集不減江鄉如鵝鳬雁鶩鷗鷺文禽之屬靡所不至蓋無弋釣之虞而有稻粱之足積嵗彌久引類而至多所未識可謂類聚羣分者矣因其來來弗拒故為洲渚灘磧使其遊泳水陸得適其性嬉而浴飽而翔晝飛夕止馴狎出沒自去自來略無迫懼以供遊豫之娛不亦可乎二月戊午縱目龍翔有鸂鶒羣居玉虹橋欄楯如所謂柱首雕飾之狀方其春波漾淥藻羽相鮮佇觀之久稍稍驚飛獨留其二相顧整翮徘徊自若殆非人力所驅而至蓋禽物野性豢養得其所信無擾無傷所致然嘗聞海上有狎鷗者果以內本無心物自不疑明矣敢方文王靈沼魚鱉鳥獸之樂乎因寓于丹青寫其目擊可喜之狀如此政和己未御製御畫并書流星自西南入尾赤白黑氣駸循起建中靖國是何年有宋端王作天子天子一日臨萬幾此心惡可無是非險相配食文宣廟忠賢勒作姦黨碑拔茆連茹固其類水火薰蕕不同器俊才打盡姦網空眯目簸粳天易位固寵先須蠱帝心帝心喜樂爭逢迎奮甲揚戈啓邊釁搜竒索玩窮山林應奉朱郎聲赫赫撤屋扶牆輿木石雷鍧風厲花石綱四海蒼生淚沾臆深宫天子知不知燕遊般樂龍翔池文禽鸂鶒集滿沼稻粱充足無驚虞止哉止哉帝心樂類聚羣分恣咸若等間飛去兩獨存又似忘機海翁閣手拈象管奪陰陽雙雙寫出如鴛鴦圖畫不足復題識心耽海老希文王文王推恩元有序親親仁民及毛羽海翁隱者貴忘機天子萬幾可誰委天子不與匹夫同可憐畫鳥不畫龍一旦敵兵犯清蹕翠華零落氈毹宫回首籞池還省不應咎當年心蠱惑忠謇擯斥悔莫追恨殺姦諛誤人國人主一心如藩籬小人百計攻伺之一有間隙投可入耳目所中皆危基帝王之學本仁義却笑宋皇心倒置河山十萬委劫塵留得丹青在天地丹青留得亦繇天汩汩興亡四百年留與後王作明鑒我歌大雅蕩之篇正德戊寅春元宵日賜進士第判順天府事仁峰病翁汪循書真迹米書九帖真迹米書六百六十八字八十六行五月四日芾啓蒙書為尉審道味清適漣陋邦也林君必能言之他至此見未有所止蹄涔不能容吞舟閩士泛海客遊甚衆求門館者常十輩寺院下滿林亦在寺也萊去海出陸有十程已貽書應求儻能具事力至海乃可此一舟至海三日爾海蝗云自山東來在敝邑境未過來爾禦寇所居國不足豈賢者欲去之兆乎呵呵甘貧樂淡乃士常事一動未可知宜審決去就也便中奉狀芾頓首葛君德忱閣下葛叔忱家計如何何人經理子弟長成不莫且依邵氏過不邵氏二子弟生事如故不令人念之息老住院隨小師在丹徒安否久不得好矣白沙有何舊人子平所苦何疾得宣城佳郡也然既以疾辭莫難便拜命不須且辭免也度過山陽或入覓之元日明窗焚香西北向吾友其永懷可知展文皇大令閲不及他書臨寫數本不成信知者在前氣焰懾人也有暇作譜發一笑於事外新嵗勿招口業佳别有何得泗戎東下未巳有書至彼俟之吾友何必原迹必字點去不原迹旁注易草體想便到古人也蓋其體已近古但少為蔡君謨腳手耳餘無可道也比稍用意若得大年千文必能頓長愛其有偏側之勢出二王外也又無索靖真迹看其下筆處月儀不能佳恐他人為之只唐人爾無晉人古氣草書若不入晉人格徒成下品張顛俗子變亂古法驚諸凡夫自有識者懷素少加平淡稍到天成而時代壓之不能髙古髙間而下但可懸之酒肆辨光尢可憎惡也中秋登海岱樓作目窮淮海兩如銀萬道虹光育蚌珍天上若無修月户桂枝撑損向西輪三四次寫間有一兩字好信書亦一難事目窮淮海兩如銀萬道虹光育蚌珍天上若無修月户桂枝撑損向東輪梅惇奉議部授漣水何處人非子中甥乎告詳問以告中間紛紛了無事蓋子中不留遂皆萎㽔昭代有此老不能與人爭得若在杞時乂須厮論也芾頓首人聞之有保老友者否岱一行一字雨三日未解海岱咫尺不能到焚香而已日短不能晝眠又少人往還惘惘足下比何所樂右草書九帖先臣芾真迹臣米友仁鑒定恭跋洪武庚申中秋後六日鄱陽蔣惠敬觀于珤古齋范致能説米書初自沈傳師來後入大令之室此九帖當時已入祕苑後有小米跋今在黃令君家前後完具尚昔之黏綴也其後一帖評唐人始言草法必應從晉此固通論殆亦其實録耶麝煤鼠尾熏染終嵗所成若此今之學者亦知之乎𢎞治癸亥吳郡祝允明跋海嶽翁此卷嘗入紹興祕府後有其子元暉題識蓋海嶽平生得意書也其中有登海岱樓一首下小字注云三四次寫間有一兩字好信書亦一難事夫海嶽書可謂入晉人之室而其自言乃爾後之作字者當何如耶甲戌九月草三日觀于崔靜伯氏敬題虎丘山人都穆此卷刻于文氏停雲館文太史鑒定所謂衆尤之尤也昔從石本想見真迹今如葉公好龍真龍下室矣乙酉九月晦董其昌觀于西湖舫齋真迹與按清河書畫舫云草書九帖筆法海岱諸帖小異有天真爛漫之趣舊為水村陸太宰所藏李西涯跋極稱許之今考此帖既無長沙題語又無水村圖記疑書畫舫所記或别是一迹卞氏書畫彚考附録于此帖之後誤矣乾隆戊子人日得間居士鮑廷博附識蔡忠惠公十帖粉箋襄示及新記當非陶生手然亦可佳筆頗精河南以書作散卓不可為昔嘗惠兩管者大佳物今尚使之也耿子純遂物故殊可痛懷人之不可期也如此僕子直須還草草奉意疏略五月十一日襄頓首家屬並安楚掾旦夕行八十七字粉箋襄啓入春以來屬少人便不得馳書上問唯深瞻想日來氣候陰晴不齊計安適否貴屬亦平寧襄舉室幸安去冬大寒出入感冒一身百病交攻難可支持雖入文字力求丐祠今又蒙恩復供舊職恐知専以為信前者銅雀臺瓦研十三兄欲得之可望寄與旦夕别尋端石奉送正月十八日襄頓首公綽仁弟足下一百二十字粉箋襄得足下書極思詠之懷在杭留兩月今方得出關歷賞劇醉不可勝計亦一春之盛事也知足下與郡侯情意相通此固可樂唐侯言王白今嵗為遊閏所勝大可怪也初夏時景清和願君侯自夀為佳襄頓首通理當世屯田足下大餅極珍物青甌微粗臨行區區致意不周悉一百零七字綿紙襄再拜伏承縣君吉葬有日襄以行路并亡男齋僧赴期不及謹遣州校少持菲禮聊以伸親戚之好殊非豐腆深自為愧謹奉手狀咨聞旦夕前行此不一一襄上郎中七兄左右草七日早七十三字綿紙襄啓去德于今蓋已洊嵗京居鮮暇無因致書第增馳系州校逺來特承手牘兼貽楮幅感戢之極海瀕多暑秋氣未清君侯動靜若何眠食自重以慰遐想使還専此為謝不一一襄頓首知郡中舍足下謹空九月八日八十四字粉箋紙謝郎春初將領大娘以下各安年下米長官亦來泉州診候今見服藥日覺瘦倦至于人事都置之不復關意眼昏不作書然少賔客省出入如此情悰可知也不一一襄送正月十日七十字綿紙襄啓中間承勞紆問適會疾未平殊不從容示書兩通知煩指幹新第有未備且與鐍鑰却候别作一番併了之四人園子只與門下每人一間園中地分與四人分種要他栽種也不一一襄奉書五日七十七字綿紙襄啓大研盈尺風韻異常齋中之華繇是而至花盆亦佳品感荷厚意以圭易邽若用商於六里則可真則趙璧難捨尚未決之更須面議也襄上彥猷足下草一日甲辰閏月六十七字綿紙丙午三月十二日晚欲尋軒檻倒清樽江上煙雲向晚昏須倩東風吹散雨明朝却待入花園十三日吉祥院探花花未全開月未圓看花待月思依然明知花月無情物若使多情更可憐十五日山堂書七十八字綿紙蒙惠水林檎花多感天氣暄和體履佳安襄上公謹太尉左右二十四字蔡公書法真有六朝唐人風粹然如琢玉米老雖追蹤晉人絶軌其氣象怒張如子路未見夫子時難與比倫也辛亥三月九日倪瓚題五十二字洪武己未四月雲間袁凱觀于蕭溪十四字在宋號善書者蘇黃米蔡為首俗評以君謨居三公之末殊不知君謨用筆有前代意優劣自可判也己未四月陳文東拜觀四十八字後學陳迪觀五字真迹日録卷二
