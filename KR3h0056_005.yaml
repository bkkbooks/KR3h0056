  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0056_WYG_005-1a, image: WYG0817/WYG0817-0590a.png}
body:
  text: 真迹日録卷五明張丑撰吳道子水墨天龍八部圖卷按此條已刻書畫舫今刪僧元成近購錢選水墨折枝花十八種白宋紙畫草草而成大饒天趣每種自題小詩一絶而不題名後有文徵仲王百谷二跋乃箬溪顧氏物也項子京收沈啓南小橋溪路小幀全學巨然僧淡墨輕嵐絶不類其平時乃是天順初年之筆按題寫贈慶雲菴天泉上人者至成化庚寅完菴復題其後雖筆嫩未及晚歲之蒼古而秀美可愛不讓荷香亭卷采藥巨册也此圖原係先大父所藏余屢購之弗獲小橋溪路有新泥半日無人到水西殘酒欲醒茶未熟一簾春雨竹雞啼此豫有竹居即景語也畫亦曩歲筆非自不知少嫩蓋為天泉強之而留其迹觀者毋深笑焉沈周隱侯何處覓家在水雲邊鶴瘦原非病人間即是仙詩題窗外竹茶煮石根泉老我惟踈放新圖擬巨然成化庚寅夏五十日過啓南有竹居為作山水小幅復賦是詩于上後四日宿慶雲精舍天泉出啓南畫索題遂以前詩塞其白間觀者幸恕豫懶右畫先大父約之藏本後為項子京所購今日重觀舊迹不勝俯仰之感漫録題詠於此米菴張丑文徵仲遊山圖後有徐天全雲巖雅集記文乃是祝希哲寫其外祖之作仍用天全印記復倩徵仲圖之藏于家此定論也不知者謂天全歿時徵仲才年三歲記文作于公未生時致疑圖引出捉刀人手豈為真鑑與夫不鑒記文出希哲筆而失徵仲妙媺之迹二老有知寧不胡盧地下乎吾故表而出之模衛協高士圖按標題疑脫徽宗二字前後有雙龍宣和小璽天厯之寶人物凡六既非八達又非七賢不知誰何或云六逸謬甚晉人而畫何啻咫尺千里其後題云晉衛協所作世人莫能及故模寫其本然行筆用意不可得其萬一數百年間未有繼者伏蒙宣示聖作妙筆神智出于自然不見施為之筆協豈足尚哉臣京謹題徽廟畫卷真迹皆命蔡京跋于卷末余所見非一二若雪江歸棹圖其一也蔡書米海嶽謂為得筆未可贋作此卷真迹無疑董其昌題真迹米南宮九帖敬聞命此石亦不惡業鏡在台州耳芾頓首伯老台坐彥臣如何芾皇恐蒙惠柑珍感感長茂者適用水煮起甜甚幸便試之餘卜面謝不具芾頓首司諫台坐芾再啓賀鑄能道行樂慰人意玉筆格十襲收祕何如兩足其好人生幾何各閼其欲即有意一介的可委者同去人付子敬二帖來授玉格却付一軸去足示俗目賀見此中本乃云公所收紙黑顯偽者此理如何一決無惑芾再行此晉紙式也可為之越竹千杵裁出陶竹乃復不可杵不如此者乃佳耳老來失弟三光遂獨出入不得孤懷寥落頓衰颯血氣非昔大兒三十歲治家能幹且慰目前書畫自怡外無所慕芾頓首二曾常見之甚安百五十千與宗正爭取蘇氏王略右軍帖獲之梁唐御府跋記完備黃祕閣知之可問也人生貴適意吾友覷一玉格十五年不入手一旦光照宇宙巍我至前去一百碎故紙知他真偽且各足所好而門幸圖之米君若一旦先朝露吾兒吝萬金不肻出芾頓首丹陽米甚貴請一航載米百斛來換玉筆架如何早一報恐他人先芾頓首丞果實亦力辭非願非願芾頓首啓畫不可知書則二月丁君過泗語與趙伯老云要與人即是此物紙紫赤黃色所注真字褊草字上有為人模墨透印損痕末有二字來戲辨才字也告留念其直就本屬虞候撥供給錢或能白吾老友吳舍人差兩介送至此尤幸角此芾頓首上伯修老兄司長不記得也不記得也在紙尾來戲辨才字蒙面諭浙幹具如後恐鼎公忙託承長洲縣西寺前僧正寶月大師收翟院深山水兩幀第二幀上一秀才跨馬元要五千賣只著三千後來寶月五千買了如肻輟元直上增數千買取蘇州州衙前西南上丁承務家秀才丞相孫新自京師出來有草書一紙玉軸間道有數小字真注不識草字末有來戲二字向要十五千只著他十千遂不成今知在如十五千肻告買取更增三二千不妨戲成呈司諫台坐芾我思嶽麓抱黃閣飛泉元在半天落石鯨吐出湔一里赤日霧起陰紛薄我曾坐石浸足眠時頌抵水洗背肩客時效我病欲死一夜轉筋著艾燃關漼如今病渴擁爐坐安得縮腳三十年嗚呼安得縮腳三十年重往坐石浸足眠真迹徐晉逸家黃子久畫蓋有二幀其一絹本淺絳色題云處靜圖為子玉寫歲辛丑一峯道人大癡此圖雖稱俊逸然尚未及紙本直幅尤佳按題乃是寫贈元琳孫君者更兼收藏得地神彩煥然與其家倪元鎮幽澗寒松足稱雙璧處靜軒圖小直幅子昻亦有在顧氏又見晉逸收柯丹丘竹石巨幅題云敬仲為獨峯作上有笑隱題詩亦佳品也吾家舊藏劉原父楷書秋水篇全學歐柳字字飛動近有客以王叔明秋水軒圖來售後有陳敬初記文亟購藏之亦一快事元鎮又有題王元用秋水軒七言古詩吳新宇藏李唐七賢過關圖絹本淺絳色有樓鑰黃溍跋尾收藏得地精采煥然亦南渡竒迹嚴君海嶽戲自寫像無住臨移妙出心匠形容浩然之氣為一時之所敬仰經綸之學衆歎曾未得施青史之名超按此後疑有闕文紹興丙寅中秋前三日子友仁贊元章生辛卯卒丁亥年三十六為元祐丙寅卒後記其歲月凡三十有九年為后丙寅實紹興紀元之十五年也紹聖豈有丙寅哉亦元宰孟浪之一事又見黃筌琴髙乘鯉圖絹本淺絳小直幅雖百破而神采如生其樹石皆從李升來參箋有冰壺居士等二人皆洪武間名流也按此條前段疑有脫文故夾注中元宰孟浪之語不知所指考之别本皆同姑仍其舊新都人家珍藏顔清臣祭姪文真迹後有張晏鮮于樞跋尾而無陳繹曾陳深文徵明題識中間顔書神妙而結搆微與停雲館帖不同未知孰為法墨耳名迹流傳日久其難于鑒定如此董玄宰云文跋本亦未得真其語庶幾近之徐太沖收唐子畏水墨踈篁倚石圖卷其畫不甚長而筆法秀潤之極本身紙上自寫詩逸趣翩翩動人後有祝希哲文徵仲别紙詩箋書法尤為精美足稱墨林貫珠十千以下無沽葑溪張氏舊藏祝希哲小楷手録夷堅丁志三卷計二十七紙其字約及萬言全法二王精謹可喜按文獻通考云夷堅志類編三卷即此書也希哲翻録宋人手鈔故仍其名耳惜第三卷不完或曰宋本亦缺其後按魯論云吾猶及史之闕文也祝公蓋庶乎近之蘇長公手録漢書全部及金剛經黃山谷小草爾雅米元章正書寶章待訪録蔡忠惠小楷荔枝譜茶録趙松雪楷行春秋左氏傳老子道德經蓮華經班班見之記載中今可見者僅吾家舊藏米老寶章録耳皇明書家所録册子有吳原博手鈔東坡志林穆天子傳鬻子鬼谷子墨子等帙不下千百紙其後則祝希哲小楷媯蜼子三近齋稿夷堅丁志三卷草堂詩餘雲林先生續集草書碧雞漫録文徵仲精楷古本水滸傳自書歷年詩文稿三十册唐子畏真書爾雅翼十二卷王履吉楷録尚書毛詩國語正文王祿之小楷張燕公文集行書玉雅宜三集文壽承小楷缶鳴集文休承小楷陶貞白集皆一時墨池鴻寶好事家所當亟購者也檇李項篤壽氏購藏韓朝延家李龍眠畫郭子儀單騎降虜圖卷按此條已刻書畫舫今刪項又新家李公麟絹本空林蕭散圖卷布景極異筆法灑然後有陸佃趙孟俯陳方等五跋惜收藏未善稍有墨點汙損終為白璧微瑕耳又有周文矩織錦回文圖卷備寫送别會合情景人物樹石皆妙前有凌晏如題署後有宋人細書則天皇后御製記文及若蘭璇璣圖詩皆名迹冠世非韓氏文會圖可擬議也李公麟白描華嚴變相長卷按此條已刻書畫舫今刪孫知微太古畫本雖以逸格著名按此條已刻書畫舫今刪項又新誇示李伯時畫維摩經相按此條已刻書畫舫今刪白石翁畫迹以水墨寫山為藝林絶品按此條已刻書畫舫今刪白日林堂雜樹陰青苔縈轉路深深屐聲鳴谷人來處不會新茶定會琴沈周此畫在張伯起家王叔明松澗鳴琴圖後有陶子昌宋仲溫題詠雖杖頭小卷而丘壑之趣悉備勝國名流詩畫至此又一變矣昔人云一粒粟中藏世界端非虛語識者勿易視之時丙子夏五玉峯張丑青莆跋吳可文示宋裱周文矩戲嬰圖卷絹本大著色是紹興御府祕本前後標題御璽全尾有錢舜舉文休承等跋亦宋畫中一名卷而紹興畫録不載則知中間遺逸者多矣王元美説部云云真不誣也按此條與書畫舫所刻不同故仍列之碧雞漫志宋王晦叔名灼所著灼别號熙堂尚有糖霜譜七篇行世最為詳悉吾家舊藏祝希哲手録漫志一册止有上中下三卷而無卷首總論按元人陶南村説郛所載具有總論第後逐改稍加刪削當會同兩本以全晦叔之舊文亦一快事記此以俟存悔齋稿一帙乃永嘉朱先生手録龔子敬之作至正初吾郡俞貞木復從朱氏本翻出此時貞木年才志學趨向已如此前輩留心風雅可重也後五年而貞木為之題後此册為吳文定公家藏今歸荻溪王寧遠氏按朱為伯賢長史名右蓋後元大儒云吳能逺氏示余梁臨樂毅論後有邢侗再跋然余細辨之係宋人筆尚未及韓太史家唐初臨本後有褚遂良小字兩行者尤為得其筆意次出周文矩戲嬰圖卷為紹興祕本後有錢舜舉詩及文休承等跋蓋佳品也次出秦少遊臨禊序前有李公麟圖極精次出趙千里山園圖大幅筆法古雅不作纖細嫵媚之態與世行本絶不相同次出趙子昻臨黃庭經前有梁楷經相書畫皆精又子昻處靜齋圖絹本淡青緑清逸之極當屬神品次出倪元鎮雙樹筠石小幅為王雲浦作而陳敬初題之最後出沈啓南唐子畏文徵仲仇實甫山水共十餘幅一一皆精不悉記云末更出張伯雨臨吳道子觀音立像尤為品外之竒焉余一日而得縱觀諸家名迹非有翰墨緣者不能享此清福耳祝希哲為湯碧山寫撰墓志絹本小楷精謹可喜其前又録乃祖彥祥墓表為商輅撰文次録乃翁松軒像贊墓志為希哲大父維清撰文俱一手精楷卷後贉紙又録其始祖墓志為戴表撰文皆真迹云今好事家例賞碧山志銘楷法超羣而不察前後之同一結搆則為無目人矣祝希哲為崦西太史行書古詩一卷全倣大令遺法筆勢奕奕動人更兼收藏得地神采煥然惜字稍大不稱冠場之作耳高季迪詩帖夜聞謝太史誦李杜詩前歌蜀道難後歌逼仄行商聲激烈出破屋林烏夜起鄰人驚我愁寂寞正欲眠聽此起坐心茫然髙歌客舍與相如雙淚迸落青燈前李供奉杜拾遺當時流落俱堪悲嚴公欲殺力士怒白首江海長憂飢二子髙才且如此君今與我將何為高啓稿呈幼文交契真迹沈啓南贈君謙山水小幀紙本淺絳色全學王黃鶴山下作園亭景極佳畫後草年始題詠之其後君謙轉贈克瞻而盛昶復書一絶句所見小幅宜為冠唐子畏為古溪黃翁作壽圖全倣李晞古後自題云堂上白髮人階前紅花草花紅草逢春髮白人年老吳趨唐寅左方有祝希哲撰文乃正德庚午七月作也唐子畏九曲圖巨幅絹本淺絳色樹石人物全師李晞古尤是水口烘鎖蓊鬱勃發詳其筆趣蓋盛年之作兼行書詩題奕奕動人十千已下無沽文徵仲竹深留客處荷淨納涼時小幅青緑細山水全倣趙松雪精妙絶倫神品上上此等名迹亦何遜古人耶沈啓南橫看一幅題云白日林堂雜樹陰青苔縈轉路深深屐聲鳴谷人來處不會新茶定會琴按此幅已見前第八葉沈周此畫全倣董北苑亦一名迹又見啓南飛來峯圖純法黃鶴山樵乃是早年同劉廷美史明古同遊武林時作二公有題詠名迹也又見王履吉小楷聖主得賢臣頌短卷乃是戊子春寫贈魏誠甫者真妙迹也邵僧彌示豫唐子畏寫贈楊季靜畫卷前有文徵仲題署乃似歸重吳原博手柬之詞一時名士跋之甚詳前輩克勤小物若此是日又見宋梓任淵注黃涪翁詩二十卷金朝刻𨽻續四册雖係冷局固自佳跋舊潭帖潭帖尤為坡公所賞以為希白作字自有江左風味比淳化待詔所摹為勝世俗不察爭求閣下本誤矣以余所見潭帖凡有數本有絶佳者有稍殘缺者有行數不同者有漏落數行者時謂劉相刋二本一留郡一藏家而後人翻開于黔和等州又不知幾本也于十卷之末或題云慶歷五年或云八年或云六月或云季夏或云模勒上石或無上石二字或云重模若以八年者為重模則五年者亦有重模字不應一年內已模而復模也內第三卷山濤帖末有風筆惻感之語洪容齋隨筆已歎其不成文容齋知其一爾此卷謝發帖云風尚所勸云云今至風字止却移筆惻感三字在濤帖之後移尚所勸以下十九字在欣帖之後又第六卷右軍字先後失次尤甚帖字屢經臨模固已失真劉次莊釋文雖有未盡亦十得五六加以陳去非黃長睿施武子更迭考辨十得八九若潭帖乃悉顛倒而錯亂之幾成異域神咒矣往往刋帖之時不敢比擬尚方欲自為帖但異其行數可也亂其文理不可也豈劉公本非博雅或貴重不暇參校或希白雖工于模字而拙于尋行數墨歟鐫刻雖工如不可讀何坡既推潭勝閣近時陳師復善書亦于閣帖有異論余恐蘇黃所見非真閣帖本爾真者或七八行為一板或十六七行為一板皆李廷圭墨模印其黑如漆字尤豐艷有精神蓋熙陵八法既髙王著輩亦精其技標題可見非希白敢望舊臨江非不善失之險薄刻削去閣本遠矣帖家故當以閣為祖綘次之舊臨江次之潭又次之武岡又次之臨江佳者可亂閣武岡佳者可亂綘汝鼎拙野無以議為也余晚得一本乃以舊潭翦碎按釋文排比裝背歷歷可讀必一老士人舊物惜不令希白見之蔡端明臨真草千文藝未有不習而工者右軍書禊帖至數十本智永臨千文凡八百本辨才年八十餘日臨蘭亭數過忠惠蔡公書法為本朝第一然二王帖真草千文樂毅論皆有臨本而千文尤為妙絶豈非備衆體而後能自成一家歟米南宮帖跋光堯尤喜書畫恨不與黃太史米南宮同時世謂用徐師川為執政以其舅擢元暉為侍從以其父余曰非也師川不踐偽楚之廷挂冠而去元暉父子皆宣仁后外姻光堯方崇奬名節方修復元祐政事故二人者俱貴顯豈直以詞翰之工乎此卷字既雄拔父書子跋尤可珤愛跋明皇聽笛圖張祐所謂間把寧王玉笛吹者韓虢兩姨也安敢當御拓而坐乎此背面橫笛三郎曲肱而聽幡綽執板立其旁而節之者其為玉環無疑也劉原父陳述古帖古靈公字不多見此帖姿媚如此可寶也公是先生帖才四十字酬對之語雖簡賓主之情甚真尤可寶也次山小金紫公字名嶠為太常少卿聽蛙君之高祖父云李伯時臨韓幹馬此畫元中題老杜讚于前伯時自跋其後元中小楷有名伯時行書間見諸帖參校與此軸字無小異字真則畫真矣或言伯時畫以紙不以絹以墨不以丹青而此用絹又著色何也余曰臨韓幹馬欲其肖幹若用素紙不出色是伯時馬也豈曰臨幹馬哉後村居士集羅集中又有王摩詰渡水漢跋江貫道山水跋馬和之覓句圖跋楊通老移居圖跋石鼎聨句圖跋李伯時畫十國圖跋不及録云吾家周砥銅官秋色畫卷為曾大父子和故物雖尺幅短景後元人題詠極多近為嚴道普氏購去矣按此條較書畫舫所刻加詳故仍列之衡翁寫山清真超妙其題咏云墨痕依約尚鮮新展卷三年迹已陳更著逺山非是贅老夫原是畫蛇人偶閲壁間舊作小幅為添逺山併賦絶句文璧歸去來圖題詠衡門植五柳東籬采叢菊長嘯有餘清無奈酒不足當世宜沉酣作邑召侮辱乘興賦歸歟千載一辭獨吳興錢選舜舉歸去來辭全文不録大德庚子十一月十二日鮮于樞書于維揚客舍陳雲樓擕示房山紙本墨竹一幀右方有子昻七言一絶全學文湖州蓋妙品也是日又示六如寫生册葉絹本各題小楷絶句全學宋人鉤染極精足稱化工之筆其設色梨花題云落燈風釀曉來寒新試羅衫不奈寬擕手玉人間並立梨花相對隔闌干唐寅為子貞畫其水墨芍藥題云一百五日春又殘花壇芍藥紅闌珊明朝恐謝燒燈看擕手玉人同憑欄唐寅為子貞老兄畫二幀並是竒品而芍藥尤為傑出云唐六如淺絳山水一軸上有詩云不向伊人求友生却于桐樹締交盟風清月白深秋夜長得噰噰聽鳳鳴唐寅真迹定林院昭文齋米芾題余定林所居因作我自山中客何緣有此名當緣琴不鼓人不見虧成王安石真迹王履吉小畫一幀上有詩云梅福藏吳市子長遊會稽客星南逼斗劒氣上干霓山水圖經選鸞皇椅竹棲乾坤自無限隨意草堂低太初兄卜隱苕溪為圖送之併係以詩雅宜王寵真迹是按集時年二十有五歲為正德戊寅石田戲柬承惠琵琶開奩視之聽之無聲食之有味不知古來司馬淚于潯陽明妃怨于塞上皆為一啖之需耳今後覓之當于楊柳晚風梧桐秋雨之際也因書帖銀鹿有誤字即筆嘲句四言奉覽勿罪勿罪枇杷不是這琵琶只為當年識字差若是琵琶能結果滿城簫管盡開花通家友弟沈周頓首謝良材契愛足下真迹玄宰畫幅余藏子久畫甚夥獨畫册二十幅自信海內無兩每一臨倣時有合處余壬申歲再入春明日多酬應雖擕行篋未暇展觀至甲戌春以請告注籍拈筆寫此圖聊得什七但未經設色為恨耳玄宰畫時年八十歲李象賢應壵台州人元末人禮部尚書嘗閲素師石刻千文極其清瘦今觀此卷運筆似不經意而較刻本頗似覺肥腫蓋緣翻勒者過于摹倣乃至失真終不若此縱橫馳驟絶無形迹意態可索足知其為真迹然必上方珍玩偶落人間一時為好古者所獲展對終日亦出夙緣豈可視為長物耶吳中相傳為水村陸公初得于京師則吾意臆之見庶亦近之敬用題數語于紙尾不敢遽謂具眼鑒定也枝山祝允明書吳淵穎集載戒珠寺後登蕺山謁王右軍遺像小立天地窄前登萬山阻越王采蕺處秋緑空榛莽古祠復何人遺像寄梵宇柳老題扇橋荷香弄鵝浦典午當衰亂神州渺淮楚經略欲馳兵保障期按堵姦溫多大志誕浩郤浪許護軍曾參綜箋疏極心膂廟謀不可勝野戰徒爭武內外未協和英雄豈豪舉泗口聊進屯譙城遽奔沮事勢日趨異朝廷孰撑拄去官寧忤違誓墓獨酸苦父子但法書功勳總塵土青緗每收拾綵筆餘圖譜草𨽻俱入妙雲龍競掀舞崔蔡須抗行羊殷特奴虜一鷖或有識野鶩紛難數平生破布被謾以指畫肚起叩故墨池長鯤戰風雨黃觀字瀾伯貴池人國初狀元禮部侍郎有酬張隱君詩云漫批華什咀餘甘欲報瓊瑶愧不堪一日返舟疁邑後幾回飛夢石湖南鶯花敢續吟春句燈火空陪入夜酣茶氣拂簾清晝午想應賓主正髙談真迹陳汝秩題王叔明溪山圖云前身定是王摩詰黃鶴溪山似輞川薜荔十尋懸緑樹芙蓉千仞倚青天長歌不用來招隱閉户應當味草玄怪底西風波浪惡披圖莫上五湖船楊妹子題劉松年趙清獻琴鶴圖云清獻先生無一錢故應琴鶴是家傳誰知默鼓無絃曲時向珠宮舞幻仙楊妹子二印文訛莫辨絹本水墨畫劉廷美上方遊覽圖成化丙戌六月草日同齊髙尚遊上方偕行者東禪敬公江右春公皆能談論釋典脫略世事所以遊必遍而酌必醉也暮歸東禪宿敬公房余適往相見復置酒邀月劇談登臨之樂因出留題絶句見示索豫和之余雖不得陪遊而聞勝事不覺逸興飛動遂續貂二首博一笑明日內翰如瓶親家過而見之亦追和前韻一絶復各寫圖録詩留于東禪敬公所他日來遊展而觀之得不為良晤之談柄云自從身去五雲邊吳水吳山别十年聞説城西舊遊寺蕭條多少不如前上方遙在白雲邊少小登臨到老年昨日山僧得新句碧紗籠在舊房前奉議大夫山西按察僉事奉敇提督屯種致仕劉珏廷美識奉題衡山先生所藏宋克畫竹元運昔崩折龍蛇鬭中原矯矯雲臺器乘時欲飛翻濩落宇宙間空抱陰符言騰驤數枝竹灑筆披煩寃清風動林壑髙節賁丘園吁嗟盤彜切鬱鬱丹青痕斯人則已矣風流今尚存文君後來彥清世抱璵璠揮灑滿天下詞林避孤鶱驊騮稍弄轡凡馬時驚奔南宮雖久蕪百年心可論叱吒丈夫志吾將排帝閽戊寅正月草八日寵頓首頓首按履吉生于宏治甲寅卒于嘉靖癸巳當正德戊寅履吉年才二十有五所書與吾家畫增太初筆法正同又見履吉聽松賦一首作于正德甲戌比時年蓋二十有一書法尚未成就乃徵仲為之代筆或云出履吉手非也又見履吉送周太常德瑞一序作于嘉靖壬午德瑞默齋子也以任子為太常時履吉年二十九全倣鍾太傅宣示帖亦一竒也其前圖引為張夢晉畫較之周懋夫頗為勝之今在邵僧彌家沈啓南送張禮部企翺還朝拂水朱旗映畫窗官船催發鼓􅽶􅽶長途筆硯無封事對寫青山過大江又題畫贈張工部企翺石古蒼苔合衣涼白羽輕人心正無事秋水亦同清木脫四五葉鳥鳴三兩聲山林與鐘鼎各自不忘情又虹橋别業為陳世本賦名園緑水新分業買地虹橋似故居窗裏碧紗籠野馬案頭青竹走書魚誦聲夜靜兼鄰織圃事春忙率子鉏市上開門亦堪隱酒壚何悔學相如沈公濟生洪武丁巳至景泰甲戌季秋三日為陳世本作雪景大幅時年七十有八又四年天順戊寅為沈孟淵寫西莊雅集圖而杜東原為之作記亦名迹也一曲陽春早為傳東風冉冉物華遷梅花近水疑寒雪柳色當門弄曉煙論道昔看重戴席題詩今日樂堯年餐霞應接安期壽自適逍遙世外篇元旦次韻奉答徵仲先生削正友弟唐寅草鳥道挂松頂漁家留水心山光搖黯黯江氣靜沉沉吳郡唐寅畫山桃亂開紅欲然我宜賞之無酒錢十常九事意不愜百又五日春堪憐誰家竹葉賖爛醉滿眼花枝笑醒眠何消苦苦仰司業便可燒茶隨玉川無酒沈周録與徵仲文學博笑壬午中秋日見紙本設色髙彥敬山水一幅墨氣淋漓筆法古雅􅍁云歲在庚子九月草日為伯圭畫春雲晚靄圖房山道人收藏有蔣伯圭俞子中蘇昌齡朱澤民姚叔雅九印是日又見沈啓南會合紀異圖卷畫品髙逸題詠清真前後有錢仁夫祝希哲錢鶴灘桑民懌朱性父等題署詩跋其詩皆和啓南元韻而成收藏得地奕奕如新趙榮祿三山秋爽圖卷前有趙字方印大雅長印後有子昻二字楷􅍁趙氏子昻方印松雪齋長印其後有兩賢詩云尺縑山谷勢凌空寸管經營董巨中一代宗工記名姓道人原住水晶宮張謙騎魚人去蜃樓空落日青銅滅沒中莫向三山問今昔桑田原不是仙宮監修國史長史李泂敬題趙子昻水墨三山秋爽圖卷全師董巨遺法詳觀筆趣蓋晚歲傑作大饒元人格律不知者謂其或似梅華菴主殆非也大抵鑒家見精細山水樹石便目為子昻手筆而未識此圖之絶倫真食而不知味者矣余今僭評子昻真迹如幼輿丘壑則精而未神如鵲華秋色則神而未化必求神逸佳品惟此等足以當之一時壓倒元白誠非過論歷數元人圖畫指蓋不能多屈若秋爽卷清真蕭灑卓犖不羣真吾家之墨皇也按子昻卷作于張受益家李溉之閲于趙仙遊後細味兩詩自見裝成并識卷尾時崇禎丙子重陽日玉峯張丑書于米菴之南榮蘭香堂卷圖詠張企翺題蘭香堂用徐字韻羡君辭藻類應徐雲霧紛披露豁如刻刻撚鬚吟麗句時時縱目讀殘書蘭香美室踰青瑣菊蕊寒窗穿碧踈八斗才名今又見奚囊珠玉過黃初吳邑奚昌次韻奉同種玉良緣喜得徐佳兒才調似相如下帷斷手千秋業閉户潛心萬卷書久識鑽研成卓犖緣知潦倒不粗疏蘭香小築臨江水素位行看賦遂初成化十年人日練水李良恭題三賢投贈先髙祖元素府君蘭香堂卷後築室相傳自執徐蘭香披拂氣紛如前人繼序登科業後嗣惟存種樹書志切猷為思奮迅心期間曠得蕭疏百年德澤栽培久五世萌芽復厥初寓吳門元孫丑拜題真迹余昔年在燕日見董北苑寒林鍾馗距今二十七年矣甲子歲暮守歲東海上外孫陶震家戲拈筆畫此圖以繼董北苑之意云洪武甲子十二月草九日黃鶴山中樵叟王叔明題六如真迹茶竈魚竿養野心水田漠漠樹陰陰太平時節英雄懶湖海無邊草澤深唐寅右畫水墨絹本全學馬和之真逸品也山頭映帶樹腰清灑可愛惜孤樹亭亭少映帶之趣耳韓幹照夜白圖白麻紙真迹前有宋髙宗標題吳説等評定本身上有南唐李後主題署及張彥逺米芾識尾賈似道印記後有危素揭汯等十二跋原係韓存良太史收蓄今歸之文氏嚴持泰擕示唐子畏獨樂圖江山行旅二卷按此條已刻書畫舫今刪欽叔文示余陳惟允慈母手中線小幅按此條已刻書畫舫今刪沈啓南為劉廷美醉餘寫出小景清逸之極前後凡再題而詩句云米不米黃不黃蓋賣弄之詞本身上有陳蒙一詩隨山頭髙下書之參差可喜惜上方賀感樓題頭一紙今不存耳此畫今在徐氏唐子畏淺絳山水一幅題云仙杏花開女几山道傍流水碧潺潺心期欲到知何日況是鄰逋剩有間唐寅此畫全倣李晞古略無周東村筆法真絶品也此畫今在李氏汪鄰幾藏明賢畫本凡百幅其最佳者莫如沈啓南喬松峭壁圖絹本大著色全師趙松雪下方人物極精與余家春草堂圖筆法一類其唐子畏濶幅全師李晞古上有詩曰泉拖玉綆懸蒼壁山削芙蓉蘸碧流光景無邊誰領略吟翁日日坐源頭吳郡唐寅畫係淺絳佳本也其次則文仇合作仙山樓閣徵仲主樹石平逺實甫主界畫人物精細之極又實甫采芝圖全倣劉松年設色空靈人物奕奕有神四畫大小髣佛乃裝堂絶迹矣尤是畫中精品末出子畏畫紅葉青山圖小幅係早年詩畫後有徵仲古𨽻題詠允為品外之竒焉其他名筆尚多不悉記云爾沈啓南早歲山水一幀紙本水墨畫頗蒼古而詩筆秀美不讓沈度乃竒迹也其題詠録後方誰將水墨戲春風竹樹人家市井通髣佛孫郎棲息處錦帆涇上寺門東陶菴心逺物皆靜何須擇地居賃畦還種藥過市每巾車委巷藤梢亂幽窗竹色虛五禽多却老雙鬢未應疏叔善先生久索豫拙惡兹慢作此并詩歸之甲申夏孟沈周輾破春雲駕小車過橋因看竹交加尋君不用逢人問自有清風引到家草庭周琇思邈移家住逺村板橋流水傍雲根杏花踏碎春風裏日日輪蹄自到門醉漁周本雨晴西郭謾將車草軟輪輕一徑斜聞説丹丘在人世萬花深處即仙家沈召細泉決決幽巖底野篠叢叢亂石中門巷日長春色閙斬新花柳自東風沈翊真迹祝京兆精楷名畫記計一百草葉餘京兆自有跋足稱神品又唐解元小畫一幅其題詠云石齒潺潺潄碧流溪山日結樹中秋野人亦有囂囂志不使長安塵上頭唐寅二件皆拾遺人擕示也唐子畏小畫一幀精細之極絹本淺絳色上有詩云緑水紅橋夾杏花數間茅屋是仙家主人莫拒看花客囊有青錢酒不賖唐寅其參箋衡山長歌全倣聖教序足稱合作其詞云斜日翻波山倒浸晚晴勾出西南勝絶島雙螺樹色浮遙天一線鷗飛剩誰翦吳淞尺紙間唐君胸有洞庭山古藤危磴黃茆渚細草荒宮消夏灣我生無緣空夢墮三十年來蟻旋磨睡起窗前展畫看恍然垂手磯頭坐湖山宜雨亦宜晴春色籠蔥秋月明知君作畫不是畫分明詩境但無聲古稱詩畫無彼此以口傳心還應指從君欲下一轉語何人曽吸西江水徵明題真迹真迹日録卷五
