body:
  text: 真蹟日錄卷四明張丑撰趙千里聚扇上寫山翠水丹山氣旁礴幾疊香㾗經手握何年破鏡飛下天吴淞水剪并刀薄江南寳繪多遺餘王孫不歸恨蘼蕪蘼蕪消歇秋風起班姬為我歌烏烏伯雨題宋諸王孫妙盤礴萬里江山歸一握卷藏袖中舒在手清風徐來縠衣薄文采于今淪落餘雕闌玉砌淒烟蕪至寳不隨黄土化門上空啼頭白烏鄭元祐次韻誰見解衣作盤礴卷懷雲烟歸掌握春雨𠖇𠖇江水波竹間日暮衣裳薄零落王孫翰墨餘越王臺殿久荒蕪要知人好畫亦好愛比當年屋上烏倪瓚次韻苧衣春暖初盤礴㸃綴溪山不盈握白雲隔浦見桃花坐使涼風起叢薄故物凋零百嵗餘王孫有恨迷平蕪衡門今日看真蹟好與人辨雌雄烏陳方次韻真蹟刻按雲林詩已書畫舫新都吳新宇藏松雪翁小楷清淨經為字五百有竒全法黄庭内景遺意前有老子立像一尊作嬰兒之状經後欵云水精宫道人畫設色竒古宛然閻令筆也後有康里子山王元馭二䟦並佳是日又見文徴仲鐵柯圖卷全師趙松雪後有祝希哲記文尚存劉公後人處仇實甫南陽草廬圖卷全傚李雲麾金碧罨畫精細活潑今歸之徐晉逸皆名蹟可喜云宋裱孫知微十一曜圖按此條已刻書畫舫今删元章四帖真蹟余年十嵗寫碑刻學周越蘇子羙札自作一家人謂有李邕筆法聞而惡之遂學沈傳師愛其不俗自後數改獻之字亦取其落落不羣之意耳春和便思弄筆札手龜不作乃可自滌研若不自滌者書皆不成紙不剪者亦如之學書來約寫過麻牋十萬布在人間老來寫益多特出少年者輒換下也毎以新字易舊札往往不肻蓋人不識老筆乏姿媚乃天成入道老來作書有骨格不專秀麗渾然天成人眇能識往往多以不逮少小下麻紙勝上楮留久一也布理宻膩二也落墨便滲三也東南多茗草陸羽以顧渚作餅今只建人工江西作之意不如達顧渚遂不能作楊貢茶時所重今易為銀土人亦不復植其茶坡呂氏請為葬地矣沿革如是地今嵗種芥來嵗種菘作虀甜辛無物比又少發風惟酒後一杯多醒也荆州六合箋名最古今人亦無能製者向長沙作皆不就其業養一方人殆亦命如建茶也真蹟丙子陽月望前二日余同朝延世兄訪吴能逺氏話間承示宋裱巨然絹本蕭翼賺蘭亭圖按此條已刻書畫舫今刪宋褙米南宫草書九帖原係思陵故物首為與伯老柬次惠柑帖次晉紙帖次玉筆格帖次論王略帖柬次翟院深畫帖次丹陽帖次博易來戲帖柬次戲成呈司諫詩帖共字七百五十有二前有紀察司半印後有芾一字印元章二字印紹興二字小璽凡舊印章三並用白鹿紙書蓋晩年筆云此卷㓜年曾觀于韓宗伯存良家故有韓世能印後轉入吳用卿手有吳廷之印今歸新都徐晉逸氏晉逸題䟦甚詳乃米老生平第一好書也較所見張子有家九帖嚴道普家八帖雖真蹟一一出其下矣項希憲家小米雲山真蹟一卷前後凡七紙墨法出入有無之間而無題署後有素心道人䟦尾及倪瓚曾覽四字即陳仲醇妮古錄中所載也崇禎丙子季秋十有二日時余初度客以此卷來求鑒定按仁樂山山主夀亦一竒事孫過庭小草千字文係楮紙書筆法全出二王漸開旭素門户前有建業文房之印後題欵云垂拱三年吳郡孫過庭寫第五本余細辨之尚屬臨本本身上有寳晉齋印左方王晉卿楷行綠絹書䟦尾尤精敘次娓娓向後轉入紹興御府帖尾小璽具存其他印識尚多不能悉記黄魯直小字三帖一卷首為坐禪箴小字僅如指頂雖早年書遒勁可喜乃是寫贈一髙僧者次為庾信送友人酒古體詩字差大中年書也較第一帖尤為精勁次為慈竹詩字比坐禪箴更小計其年更早實元祐初筆也紙色稍覺昏暗三帖並屬無欵蓋真蹟云趙松雪小楷玉洞經精楮所書墨彩煥發款云大徳九年十月八日吳興趙孟頫書字頗肥澤與公書道徳經相伯仲所惜習氣尚未除耳末有文休承䟦極稱許之右方三卷俱嘉未項氏故物乃戴生擕示也松江張七澤家東山小隱巨幅紙本淺絳色乃黄公望王淵合作并石巖題董復收蓄其次張無為一詩皆佳作又有吴興山水賦一冊絹本行書全倣蘭亭遺法細按之為子昻自作自書惜墨氣黯黮不及公書左思詠史詩并十七帖臨本尤為烜赫耳王逸少氣力帖係唐臨其小楷樂毅論卷妙絶後有褚河南䟦又褚河南細書度人經閻令畫相畫今不存徐浩書張九齡司徒告絹本尤妙即米氏書史所載者顔清臣自書誥真蹟板實柳公權翰林帖小楷精𦂳紙墨並佳李營丘古木寒泉筆墨秀發李公麟石鼎聨句圖絹本白描真蹟古雅蘇子瞻書天際烏雲合詩後有黄魯直題識趙子昻楊妃上馬圖一名攀鞍圖畫法全出唐人皆韓太史存良故物也今皆散逸令人夢想沈啟南小幅山水夕隂散平野微風汎髙柯停舟古㟁側漱盥臨清波嗒然弄筆餘所得良已多舟泊城隂為紹宗圖而詩之癸巳五月既望沈周真蹟白此畫宋紙所畫全倣倪元鎮春草堂開對逺山怡怡兄弟共承顔伯髙書展龍蛇動靈運詩成夢寐間幽岫白雲欣入望投林烏鳥倦知還陶然萊綵為歡日肻羡人寰有抱闗安里張禎真蹟沈啟南春草堂圖西郭亂雲千萬山雙親好住此山顔有身獨館庭闈外方寸不迷天地間春草喚愁人有感夕陽刺眼鳥知還老夫珍重今題讚更喜髙篇與孝闗沈周次張禎一詩千里親居帶亂山見山珍重似承顔正臨遊子瞻依地況有髙情水石間重樹不遮心獨往片雲時與夢俱還莫言烏鳥無情物落日投巢意最闗文璧次城東湖水城西山何縁兩地違親顔心懐山水遙連處夢繞塤篪交奏間喬木鸎兒欣有託舊巢燕子敢㤀還百年冰玉情猶在早晩辛勤同抱闗長洲浦應祥阿翁僻愛住青山水遶雲重阻靣顔有我若違千里外無思不在數峰間夢囘塵市頻瞻望心積烟霞黙往還爽氣逼人自朝暮小窗徙倚底須闗文林奉和真蹟園居雜詠紗㡌籠頭客潛身獨樂園運籌師管樂髙枕誦虞軒徑遶松筠色山呈苔蘚㾗我來題鳳字何異歴金門和趙寛韻張禎送行詩天祿燃藜冷翠烟歸來窗下枕書眠致君前席陳先後用巧方心規大圓判袂良明連畫舫虛懷睿主列經筵推篷撿㸃詩三百陟岵憂深寄短篇安里張禎和馬愈韻次劉昌後真蹟國初以道術名世者自莫月鼎外其次𤣥真周子周傳秋谷張子張傳紹禎陳子後先三世皆以文學振虛無之統故名流韻士多樂與之遊好事者至圖狀以俾斯其人從可知已此鶴林畫卷乃嗣四十二代天師無為為𤣥真子作後有劉䟦張益記鄒亮鄭璆韓雍三詩其前贈鶴林其次贈秋谷其後贈紹禎者即是以觀三子而三子之所造詣可以窺其梗概矣𤣥真别號鶴林髙巽志作傳倪瓚寫圖系以靈鶴辭䟦同時投贈詩篇者數公並聲畫不凡詞采烜赫實方外之竒蹟也今在董𤣥宰太史家迄今常在夢想余此卷雖屬冷局而無為係同姓老宿永熙則同郡鉅卿故為之重裝展玩而意尤珍惜之時崇禎改元上已日玉峰張丑青浦志于真晉齋周伯琦手錄周齊侯鎛鍾銘凡四百九十二字其詞曰惟王五月辰在戊寅師于淄陲公曰汝及余經乃先祖予既敷乃心汝小心畏忌汝不墜夙夜宦執而政事予私厭乃心予命汝政于朕三軍肅成朕師旟之政徳諫罰朕庶民左右毋諱及不敢弗敬戒䖍䘏乃死事穆和三軍徒衕雩乃行師慎中乃罰公曰及汝敬共辭命汝應鬲公家汝恐恪朕行師汝肇敏于戎攻余錫汝釐都𦙍爵其縣三百余命汝治辭釐造國徒三千為汝敵寮乃敢用拜稽首弗敢不對揚朕辟皇君之錫休命公曰及汝康能乃有事率乃敵寮余用登純厚乃命汝及母曰余小子汝敷余于艱䘏䖍䘏不易左右余一人余命汝緘差饗為大事繼命于外内之事一本云余命汝緘差正饗繼命于外内之事中敷􅀢刑汝以敷戒公家應䘏余于􅀢䘏汝以䘏余朕身余錫汝車馬戎兵釐僕二百有五十家汝以戒戎作及用彧敢再拜稽首應受君公之錫光余弗敢廢乃命及典其先舊及其髙祖虩成唐又敢在帝所敷受天命刻伐履司敗乃靈師伿少臣惟輔咸有九州處禹之都不顯穆公之孫其配􅀈公之􅀈而􅀈公之女雩生叔及是辟于齊侯之所是小心龔齊靈力若虎謹恪其政事有共于公所􅙀擇吉金鐡鎬䥈鉛用作鑄其寳鎛一本云有共于桓武靈公之所桓武靈公錫乃若金鈇鎬元鏐􅀈鋁乃用作鑄其寶鍾用享于其皇祖皇妣皇母皇考用祈眉夀令命難老不顯皇祖其作福元孫其萬福純魯龢協而有事俾若鐘鼔外内開闢一本云龢恊而凡事外内停詞都俞造爾朋㓷毋或承類汝考壽萬年永保其身俾百斯男而執斯字肅義政齊侯左右毋夾毋已至于業曰武靈成子孫永保用享真蹟吳可文擕示唐吳道子天龍八部圖卷按此條已刻書畫舫今删徐晉逸新收黄山谷行書魏徴砥柱銘後有公自䟦極詳紙墨精好筆法縱横詳其結搆蓋早年書也同時有曲肱寮及杜竑等三䟦并謝采伯題名皆極推許之我明天順間為公裔孫詢所購一時題識者九人而其名蓋不甚著此卷舊藏項子京家其品尚在經伏波神祠真蹟之下按寮姓張氏即山谷諸題云題宛陵張待舉曲肱亭記見年譜元豐甲子嵗時年四十矣張丑識蛟門文類有茘支圖序捕魚圖序祖二䟽圖記八駿圖序石氏畫苑記九疑山圖記畫西方變贊怪松圖贊韓幹畫馬贊龍馬圖贊秘閣五絶圖賀鑑草書贊潤州江寧縣瓦棺寺維摩詰畫像碑徴君洪厓子圖賦畫枯木賦進南齊臨軒圖表進圖書古器物等表觀八駿圖説蔡邕篆勢衛恒字勢𨽻勢崔瑗草書勢皆博古之士所當熟玩者也𢎞治癸丑家君居憂廬陳湖後就養一齋兄于城府久之從吾南洲長兄之請偕吾母即城西之射瀆居焉其地得山最多髙堂廣庭可以舒吟眺水鮮陸珍可以奉甘㫖鍵獨承命依學于外氏判院周公居閶門雖能放舟時一承顔未免復退往往身返而情不隨兀然空身毎不自己因自號曰懷山反復之餘不覺形之章句因就筆札冀時接耳目無惰方來焉耳陳鍵志出城廿里好西山遊子看山有後顔爽氣應來起居畔㫖甘深愧品題間心隨落日毎俱下眼望飛雲欲共還不是歐公樂游賞此情朝夕自相闗真蹟米南宫真蹟虹縣舊題二首快霽一天清淑氣健㠶千里碧榆風滿船書畫同明月十日隨花窈窕中再題碧榆緑柳舊逰中華髪蒼顔未退翁天使殘年司筆硯聖知小學是家風長安又到人徒老吾道何時定復東題柱扁舟真老矣竟無事業奏膚公米芾二詩陸子垂鈔示米海岳真蹟空五六字數惡詩上呈空二字陳建州覺民七年烏㡌􅎨黄塵晝錦歸來世又新若過武夷山下看人間不太敝精神白頭何慕久京華靜洗黄塵眼界花萬寳精神在風月好詩追取不須賒陳詩首唱云汩汩塵埃閲嵗華青山相見認空花清淮風月元無價憑仗詩翁為我賒又一篇云長淮千古自流東六月城頭日日風天際玉潢無出處夜山圖在月明中絶唱也為之刻而不復和朝廷遣詔使未離國門諸監司縱横遣官每司兩三輩交馳體訪按察將迎旁午詔使未嘗到而郡縣已不勝擾矣未曉此豈朝廷徳意民之利病州縣利害恬不恤而撿㸃外物簿書是何用事此卷行草大如錢許無題名并䟦今在陳季白家晚年書也王晉卿西塞漁社圖為李次山作絹本大著色董𤣥宰題語謂其與瀛山圖同格恐未必然其後吴仁傑范成大洪景盧周必大王藺閻蒼舒趙雄温叔尤袤翁埜九䟦皆南宋表表著名者此卷藏王遜志家真名蹟也細按引首畫圖係院人筆非晉卿也米海岳真蹟觀使樞宻太尉先生鈞席芾頓首再拜經宿恭惟台候萬福伏想般舟良勞神用俟到蕭閒參見次前蒙寵錫嚴命不許辭然今有所獻公亦何辭以拒之通圍願隨茸錦增光久為選人鈍滯非稱也若不以為洪願撿入謹奉啟不宣芾頓首再行芾頓首啟臘雪思閲古南閤向火團古物賞不識但怕向晩數杯三日病辱敎何從得此語必誤也恐是第二人及第朱紱筆如命納二枝醲墨入之乃用世無比試與此中匠作之乃右軍自畫真後筆様也傾企何當面罄芾頓首再拜君發太尉台坐之杞拜達旋得官江湖歸家山杜門不出人事殆絶比到都見陳子真承動靜復知已更王夫人之痛不覺嗟悼不能已復自咎不敏阻貢尺書以勞孝思内有慚負久不能已比日台體起居何如謹奉啟通誠拳拳下情此不能宣芾頓首再行黻頓首再拜君發太尉台坐小兒益長人物不凡伯時姻事有期未黻頓首再行硯在合内真蹟米南宫真蹟秋暑憇多景樓縱目天容曠披襟海共開山光隨眦到雲景渡江來世界慚雙足惟未入閩生涯付一杯横風多景夢應似穆王臺六行後有李東陽詩題其尾真蹟目右詩見英光堂帖止異十字耳而題各别詳味句法字法真蹟為勝李伯時白描卷蕃王佛禮丹泉唐俞佛身充滿大千界蓮座𤣥談海水翻融攝羣脩證圓覺靈通虚徹卓然存玉笥李簡玉峰善士唐漢卿擕蕃王禮佛圖請贊為之贊曰九夷八蠻聲教罕至惟見佛容必恭敬止維王在前載拜稽首羣從咸集嚴列左右峩峩其冠楚楚其服虬髯螺髪穹鼻深目伊昔宋代鮮有其人方今聖朝來往日新曩迦辣藏朶囉賽因撒藍麻哩名動縉紳言不雅馴訓義無别粤有象胥善為解説式觀此卷畫手非常裝潢藏之有耿餘光時至正十年上章攝捉格孟􅑍已立春六日郡城天台老學沙門餘澤七十四嵗書于寳馬寺東廡如山重公之煖閣香水海中傳直指碧蓮花上結跏趺方今象教行中國况爾蕃王部落俱八十五翁易偉雕題朱髪紛重趼竺國西來聽梵音仰止孔壇羣弟從杏花春雨坐彈琴吳下周備花雨繽紛寳樹重戎王卑俯近慈容從來禮樂聞中國幾度鑾輿下辟雍雁山戴寧維西列萬國有土此有人孰是無繼立而能治其民佛化大無外萬有入彌綸衣冠雜誕獝莫不悉來賔東方九州地治教亦具陳豈知五經表復自敘彛倫斥鷃譏南運舜英疑大椿擴充固有道一眎歸同仁東臯釋妙聲金繩鹿苑四花香沙界蓮臺法雨長蕃落左賢齊膜拜皈依始信有空王嘉禾彭冲溪真蹟冷啟敬蓬瀛仙奕圖䟦張三丰䟦另見不錄冷先生以冲舉妙道雅入丹青三昧故應春絲幻出色色飛舞吳道子一日之力李思訓數月之功可謂兼之此圖正其得意筆也聞余友人俞孺子秘藏久矣令嗣君經牧詩才冠絶一時余尤愛之重之一日訪余東佘苕帚菴擕此相賞神情灑灑何啻秦太虚之閲輞川圖也遂書此以識勝事云陳繼儒真蹟米菴圖袖卷米菴為青甫文書董其昌青甫力購海嶽翁寳章待訪錄真蹟得之樂甚董𤣥宰太史以米顔其菴余為作圖因以自號焉文從簡識米菴圖米南宫楷書寳章待訪錄凡四千餘字相傳為勝國趙文敏公物有趙氏子昻印有我明為陸冡宰所藏外舅張茂實先生屢物色之不可得為生平欠事内兄青甫氏最好米蹟見輒下拜猶南宫之見石從陸氏後人踪跡二十年餘始傾貲購歸非苐適所好政以述先志也遂自號米菴余為作圖識其始末遁士文從簡書於城南野築米菴詩蘇郡婁闗張青甫家世玉峰文苑虎廿年酬酢誼逼古彼此相宇為舊雨近傳米菴圖膴膴識者競呼米菴主過客不識求吾吐茲事匠心蓋有祖前朝曾有虞邵菴契其擊壤樂且湛英光秘集張君躭抱膝長吟日與參充棟之中悦㫖甘廣採外集歎竒男皇虞混沌樂憨憨與世推移迹渾涵隘與不恭坐而函氣類脗合號非慚久要尚友求合簪四載濶别夢不堪辱憐衰老賁村南請宣厥㫖願同龕青甫先生下言詮所蓄不敢漫自顔眉山豫章筆娟娟未若米氏尤蹁躚吾家先翁愛老顛謂為風氣甚𤣥𤣥墨寳不得一近前生平蹉失竟游仙小子收購傾囊錢寳章待訪聲班班頡頏鵝羣五千字端嚴雅正絶嫵媚麻姑仙壇難比粹北海復生安敢議蘭亭有一此無二珍藏十襲毋輕示米公留此在人間訝之以顛皆過例張君以孝以闡幽斯號斯㫖愚見未譬之伯夷雖隘惠不恭一種清和萬古貴江隂赤㟁徙南村李如一天啟甲子端午甥文柟畫米菴圖米菴記别見天啟丙寅端午日書于南城野築之秋引甥柟真蹟趙子昻疎懶軒圖詠我問疎懶翁翁作如何疎翁言我不疎翁作如何懶翁言我不懶不疎何以名其疎不懶何以名其懶豈知不疎之中有真疎不懶之中有真懶凡物成真始有傳所以草堂疎懶至今存詩篇誰知後來有繼者乃復以此名其軒詩傳以紙尚不朽扁傳以屋須㬰久願翁子孫賢如翁世世雍穆居軒中勿為苛􅣊損元氣勿為刻勤傷醇風迺翁疎懶未廢此後人勤􅣊愳妨彼他人猶可言同我即由已我不能勤不能􅣊懶亦無庸疎亦失若欲識翁疎懶意請看軒中疎懶筆子昻為澹然書真蹟張芝章草帖真蹟紙素千年絶迹史家自漢後迄崇禎千有五百嵗矣其稱伯英芝白帖者重言也特以吾家先哲又是書苑第一人按帖且晉臨也故取冠篇首雖少損真鑒所不辭云書家以張伯英為開山第一祖其楷法不可得而見矣世傳與吾家平復帖紙墨略同行筆亦相髣髴後有海嶽翁䟦尾幾二百字今在秀水項子京家按米氏書史云余白首閲書無魏遺墨斷自西晉伯英寳帖豈晉人臨本耶海嶽悉而題之亦久問冠軍茾耳或云我家平復帖真伯英書見宣和書譜虞世南傳中宋秘府譌為陸機書何殊指鹿為馬耶王元琳伯逺帖真蹟歌自從金入宣和殿晉人真蹟世罕見二王之外尤無聞胡乃此帖傳王珣四十二字鬬竒絶字字精芒射天闕蕭疎逸宕轉姿態牝牡驪黄半明滅當年宣武稱黒頭誰其大筆東亭侯至今江左僅兹帖如椽恍忽存風流錚錚伯逺𨽻書譜妙蹟宣和曠今古右軍大令俱塵埃靈光一柱猶蒿萊九百餘年秘雲笈暗中鬼神互呵斥何論寳玉與大弓茅齋白日飛長虹胡元瑞應麟薛道祖真蹟昨日得米老書云欲來早率吾人過天寧素飯飯罷同閲古書然後同訪彦昭想亦當奉聞左右也侵晨求見庶可偕行幸照察紹彭戲鴻堂帖摹刻趙文敏書謝惠連雪賦皇慶改元秋九月望日子昻為進之書小行書又嵇叔夜絶交書子昻李白蜀道難子昻並錢大行書皆遒勁可喜盛年筆也真晉齋記古之以寳晉名齋者蓋自海嶽翁始也翁雖生宋室乎然目窮千載足渉萬里家藏法書名畫盈箱溢篋求其晉代古蹟指不多屈焉翁寄薛道祖詩云二王之前有髙古有志欲購亡髙貲薛和篇云至今所收上卷五流傳未免識者嗤詳味其義真晉蓋難言之矣予小子丑挺生歴刼之後數符五百之期生平並無韈線微長至于考定遺蹟不敢有所多讓閒嘗購藏小楷寳章待訪錄真墨既以米菴自號矣乃因平復帖顔其齋曰真晉誠重之也誠慎之也夫晉人之書至羲獻止矣翁獨有取于謝公之慰問謂出破𦍑十二月帖以上豈相賞其脫去筆墨蹊徑與㑹心哉而翁也丑白首閲書凡三十年于兹矣所見羲獻劇蹟自畫贊二謝十三行外亦嘗募得此事帖廿字為宋宣和秘玩又鄉先輩王濟之所藏也麻牋真迹筆如游龍自幸足了一生人間未見其比旋為猶子誕嘉豪奪而去至今尚存夢想嵗在戊辰復得陸士衡平復帖于韓朝延所其書即海嶽翁題䟦晉賢十四帖之一原與謝公慰問同軸有晉人殷浩之印是李公炤故物語具米氏書史中今寳章待訪錄訛為陸雲書非也朝延蓋名家子與予善家傳歴代名蹟甚夥一一甲于江南其尤醉心者莫如黄庭内景經十一月廿七日帖絹本小楷曹娥碑大非褚河南千文張長史宛陵帖顔魯公自書吏部尚書告所能企及萬一焉然予細辨之内景經係楊羲和筆廿七日帖屬唐人臨寫右軍曹娥碑則晉無名氏書雖稱巗巗清﨑壁立千仞何如平復九行為西晉名賢手蹟且章草竒偉逺勝索幼安謝安石輩乎則夫齋名真晉良不誣耳帖中如羸難平復病慮觀自軀體閔榮寇亂等字翩翩自恣真有畢世臨橅未能得其髣髴者一字買堪貧子羙豈欺我哉吾家茂先稱士衡為吴民之儁龍躍雲津而丑于平復帖靡朝靡夕仰窺逸韻可謂奕世通好矣愛莫能助聊為記述如右是嵗清和十日張丑撰真蹟十六百五字趙文敏文大史䟦董其昌題古法書名畫其殘缺處皆不可全補故夫璧有瑕請指示不害其為國寳必欲全補之是謂貂不足狗尾續奚可哉時因展觀平復帖真蹟漫書天啟甲子秋蘇臺張丑百計購得大王此事帖係宣和殿寳書建尊王室以居之旋為猶子維芑豪奪興味索然越三䙫戊辰而崇禎改元韓王孫朝延以陸士衡平復帖見與亦晉字也述真晉齋記志其盛日望維芑歸我逸少遺蹟作詩示後情見乎詞王家此事宣和購楚國亡弓小酉收真晉名垂平復在延津作合寳章修是嵗冬十月朔來蘇軒書真蹟四一百二十字張伯髙秋深帖今草竒逸詳載寳章待訪錄中時年八十有八徴明故是第一名蹟也趙子昻有臨本董𤣥宰摹刻戲鴻堂法書部直云伯髙手筆近始獲觀趙公臨本于項氏與石刻筆法不差毫髪英雄欺人類若此名人書畫卷題䟦記入錄者于左季真表平復帖謝安慰問帖韓熙載夜宴圖清明上河圖淨名齋圖聽雨樓圖此事帖二謝帖快雪帖眠食帖唐臨十七帖褚臨禊敘定武蘭亭洛神十三行五星二十八宿圖深慰帖游春圖夢奠帖褚書千文度尚庾亮帖哀冊文天王送子圖洪崕仙圖明皇夜游圖江干雪意圖春草帖采蓮圖夢游瀛山圖仙奕圖雙馬圖東丹王人犬圖春宵秘戲圖過海羅漢圖五牛圖懷素絹本千文酒狂帖顔魯公自書誥季明文爭坐位帖李㫒髙賢圖神仙起居法松庭㑹琴圖石曼卿古松詩金明池圖李建中千文茂林逺岫圖李成寒雅圖董源溪山風雨圖周文矩文㑹圖錢舜舉維摩像孫知微十六羅漢圖烟巒秋曉圖浣花醉歸圖茘枝圖秋山蕭寺圖楚江秋曉圖秋山漁艇圖巨然山寺圖文湖州山水圖盤谷圖此君圖九歌圖慈孝故實圖君臣故實圖女孝經相維摩説法圖三馬圖贊九辨乞居帖芙蓉城詩寒食詩頭陀贊發願文馬伏波廟詩大江東去詞法語寳章待訪錄壯觀圖米臨坐位帖皇太后挽詞杜陵山水歌風雅八圖湖山烟雨圖大姚村圖小米雲山短卷伯駒東坡水樂圖仙娥圖龔開鍾馗圖聽琴圖老子出闗圖百牛圖下蜀圖過秦論三清殿記管夫人漁父圖唐人漁父圖管夫人竹石圖梓菴圖思安圖溪山暮靄山村隱居圖巢雲圖鐵厓圖溪山雨意圖平林野水圖南村真逸圖寫憶秦娥詞意惠山圖春山嵐靄圖水竹居圖夏雲欲雨圖思永堂圖友松圖仙山樓閣圖西園八詠秋山樓閣圖祝臨黄庭經祝書逍遙游篇王濟之出山圖招隱圖野望憫言卷煉藥圖秘觀叢桂齋圖少峰圖先公夀言圖孝友餘慶圖倪迂贈袁子方圖米菴圖觀瀑圖溪山仙館圖王維二水共計一百三十三件趙榮祿松竹草堂圖詠䟦子昻畫品上接六朝唐宋之脉下開有元神逸之門乃古今畫家第一人也苐袖卷傳世不多除道釋人物花鳥畜獸竹石外其山水班班畧具記載中矣不腆潛心玩索前後目覩名蹟自當以鵲華秋色壓卷而山隂水村李白觀瀑鷗波秋曉次之㓜輿丘壑尤妙惜破損已極僅存筆意重江疊嶂雖稱完璧全學郭熙非其至者此松竹草堂乃是投贈澹然翁筆既能古雅又復秀潤且左方一詩與圖互相發明真得詩中畫畫中詩三昧非區區丹青之流所能企及萬一耳装成僭評如右不識真賞家何以命我時崇禎辛未嵗重陽日米菴主人張丑書真蹟二二百十字小米山水紹興二年三月二十日米友仁作右宋米元暉水墨雲山圖後有沈啟南䟦尾檇李姚公綬故物也雖蕭疎逸筆備有咫尺千里之趣為真無疑崇禎戊辰四月八日獲于韓朝延氏是嵗十月之望米菴張丑命工重装把玩無斁真蹟字九十四唐人臨右軍東方朔像讚原文不錄此唐人臨右軍書芾䟦唐人臨右軍像讚卷後右軍小楷真蹟人絶少世傳黄庭多惡札而樂毅亦梁代模書像讚非晉筆米海嶽審定豈容議耶文皇書宗逸少當時自虞褚而下家臨户學右軍衣鉢遍天下然拘則乏趣蕩則踰矩下筆往往不逮前人今之去唐又何啻唐之去晉耶得唐人真書足稱寳矣豈其食魚必河之魴乎嗟夫老夫耄矣追思往哲實勞我心李觀周書七日興歎患其無骨蔡入鴻都觀碾十旬不返嗟其出羣予于此卷不能無感云故紀之洪武五年秋八月吉日翰林學士亞中大夫知制誥兼修國史金華宋濓書東方生畫贊陶隱居所稱右軍有名之迹即宋搨已如晨星況唐人臨本乎唐人故善書爾時必有唐以前搨下真蹟無幾者今之不能為唐臨可知矣董其昌觀因題昔人云法書臨摹有二種摹帖如梓人作屋締造雖具凖繩工拙自異臨帖如雙鵠摩天各隨所至而息此善喻也二法皆莫善於唐人彼其去古未逺學力更深用筆操縱自如所以可貴是帖為唐臨右軍東方像讚其結束波䇿若優孟之學叔敖至其隱勁于圓藏巧于拙黯澹有餘鋒頴不露信非唐人不能臻此余所見韓宗伯家曹娥碑本正與此帖相類不必取證于米家數言也今世得晉人真蹟甚難買王得羊已為希覯故宋學士所以三復興歎耳昔年曾見之吳敬仲處今歸用卿漫識數語于後己酉良月新安晩學汪道㑹書于白門長千里陳繹曾有翰林要訣法書論見書史㑹要梁則滿騫徐僧權沈熾文朱異隋則江總姚察等署記其後唐虞世南臨禊帖後慶元五年十一月廣平李洪觀于東臺直舍嘉定三年辛未閏月十九日宛陵吴柔勝莆陽蔡君闢莆陽黄伯荆相臺岳珂嘉定辛未閏月晦日同觀于故府唐虞永興墨蹟稀如麟鳳昔在寳評書已有今好事家一字亦無之歎近聞翁修羽世藏夫子廟堂碑進呈墨本韻致楚楚倘得核閲則夫生今之世得見前人所未見何遽少遜古人􅁘米南宫進自書小楷千文表臣伏蒙聖恩如黄庭經寫千文臣自幼便學顔行至於小楷了不留意三年前題䟦古帖猶尚可觀造化宻移目加昏眊毎欲重改兩筆如鉤既懼違于天威遂勉竭于小道内懷悚慴差悮愈多仰祈天度曲加寛貸臣芾惶懼震恐謹上真蹟米手柬三帖盛製珍藏榮感日夕為相識拉出遂未得前見寒光之作固所願也一兩日面納次黻頓首天啟親向亂道在陳十七處可取和及米寒光旦夕以惡詩奉呈花卉想已盛矣脩中計已到官黻頓首天菓何幸須靣謝見主人奉為言也未知何物爾無事見過病少已力惙惙黻頓首陳弟右米公三帖昔年曾見刻本于陵家其結搆無少異蓋名蹟也苐前後署名字形各不同非游戲翰墨者能之耶按公傳世真墨蚤年例作黻字至立嵗外始改書芾此為元祐初書無疑惜寒光之作散逸不存無能收入集中耳時萬歴丙午寓婁水張丑識虞永興真蹟大唐故汝南公主墓誌銘并序公主諱字隴西狄道人皇帝之第三女也天潢疏潤折浮夜光之采若木分暉襛華朝陽之色故能聰頴外發閑明内暎訓範生知尚觀箴于女史言容成則猶習禮于公宫至如怡色就養佩帉晨省敬愛兼極左右無方加以學殫綈素藝兼鞶紩令問芳猷儀型閨閫某年某月有詔封汝南郡公主錫重珪端禮崇湯沐車服徽章事優前典屬九地絶維四星潛曜毁瘠載形哀號過禮繭纊不襲醴酪無嗞灰琯亟移陵塋浸逺雖容服外變而沉憂内結不勝孺慕之哀遂成傷生之性天道祐仁奚其𠖇漠以今貞觀十年十一月丁亥朔十六日已下缺文真蹟題錢舜舉著色葵花端揆向日承明地舜舉丹青肖像真奕葉承傳綿世澤積時歌詠見皇仁玉峰張丑楊少師韮花帖楷書晝寢乍興輖飢正甚忽蒙簡翰猥賜盤飡當一葉報秋之初乃韮花逞味之始助其肥羜實謂珍羞充腹之餘銘肌載切謹脩状陳謝伏惟鑒察謹狀七月十一日狀自顔柳沒筆法衰絶加以唐末䘮亂人物凋落文采風流掃地盡矣獨楊凝式筆勢雄傑有二王顔柳之餘可謂書之豪傑不為時代所汩沒者右錄東坡評語孫過庭既得平正須退險絶書家以險絶為功惟顔行與景度草得之景度好題寺壁不甚書縑素即宣和所收亦復寥寥蘇米皆學其書故推重若此其昌戲鴻堂帖新又凝式草書歩虛詞十九章欵云清泰三年六月廿六日記子昻父光禄大夫字子中系出宋藝祖自秀安僖王五世至子中秀安僖王生崇憲靖王諱二二生新興恭襄王諱二二生通議大夫諱二二生子中二二生子昻喜得右軍此事帖真蹟敬度真珠簾一闋以志之吾家故有宋搨定武蘭亭五字不損本故詞首便及之蘭亭定武明如繡珍藏久不數那鍾張顔柳此事更風流喜入手非偶思逸神超真希有得配合天縁輻輳向尊前同效手飛白頭相守風送嬌音題寳章待訪錄後風入松髯張學淺愧無能遺墨裏伏膺牛晉皇晉有牛在馬後之䜟論書要與南宫並惜奴嬌感師恩不腆閲書實為伯起先輩指示云難酬盡擬躬親了一生常把寳章刋定展觀雲麾將軍李思訓設色采蓮圖卷敬度浣沙劉月蓮一闋題後浣溪紗楊柳眉芙蓉面卷舒閒滿幅雲烟蘇臺宫殿月嬋娟正縁空一鏡升也天劉潑㡌漸餘霞散綺違初願珠露圓􅀈拂處爭歡忭秋夜月紛紛離合難排遣聽棹歌似翦金蓮子珠一串聲聲可憐看雲麾小袖卷筆空靈揮灑傲龍眠玉峰張丑詞度滿江紅題子昻畫李白觀瀑圖卷後思憶王孫聞趙李輩才情兩擅瞥然見圖成觀瀑光生几案斗酒百篇詞賦祖寸心千古丹青冠是雲東逸史錦囊裝無雙玩寓吳門張丑兒時獲觀子敬洛神十三行真蹟漫不省錄是後追憶其神化勤購弗能得歴三十年所今不知深藏何地矣敬度沙雁揀南枝以弔之雁過沙想官奴渺難期賦感甄洛神賦成名感甄剩喜飛麻牋積漸成散逸多虧帝輔能重㑹嫵媚動人深相憶鎖南枝龍在淵思未釋劍還津淚偷滴米菴張丑撰米菴力購李西臺千文甫就尋為猶子誕嘉所得作蠻牌令自遣云千字建中揮覿面了頓忘飢一從他别後使我淚長垂空想著豐肌俊姿何年貯金屋鴛幃涪翁賞伯可題誕嘉魚水深䕶蛾眉崇禎庚午端陽節書東風第一枝題韓朝延家展子䖍春游圖卷逺水生光遙山疊翠錦衣公子雕鞍問誰纎指春風展生畫就齊紈流傳何在臯橋畔五馬諸韓只恐伊蝶散花飛臥游日日盤桓清河張丑較閲海嶽翁小楷寳章待訪錄真蹟是蜀紙烏絲闌寫本全學歐顔褚李筆法是而翁第一名帖傾資力購始得之謹度月雲髙一闋歩髙東嘉元韻歌漫以自慶焉月兒髙倣書勞頓鍾王果難近降格寫歐顔李把烏絲刷使盡名重書林看清勁比疎影欽海嶽期棲止展寳墨連忙投逩渡江雲正是集古名家真異人竭力更堪收藏羞賤貧崑山張丑寫于雙玉亭海岳對上云臣書刷字文寳章待訪錄宋史藝作寳墨待訪錄閲王右軍黄素黄庭内景經真蹟敬度八寳妝一闋為報黄庭趣倍添不比殘針線半萬蠅頭應接芳亂名筆百千都堪罷遣金題玉􅉜閒凝盼筆法長留仙姿不見仲將螺黛色垂殘故弄柔尖望重斗山無雙國士思量徧怎比得羲之春笋纎蕭閒堂上等得眼兒穿及見餘作念也那轉憶清真不貼眠内景經引七百四十四字又四百三十六句該字三千零五十二字内缺七字又結尾五字共三千七百九十四字梁溪劉大香梁州序蛟壺斟滿龍尊傾倒竒玩供人歡􅀏蘭亭聚訟多君淑問如臯浣溪紗甘露零明蟾悄把名賢一一相邀劉潑㡌籠頭賤却烏紗㡌情正豪聽寫出嵇康調大迓鼔迢迢客路遙長房縮地景仰䰟勞神游罨畫屏山峭摩挲靈璧五峯髙香栁娘且停杯聽著且停杯盼著驩娱此宵不枉了闗山同照新詞月雲髙月兒髙墨池思忖楷法久無准毎日把驚人句將八法體認提筆名言空教我受艱辛黼扆文贈慇懃絶勝讀那金箆渡江雲縱使刻骨銘心難報恩筆勢當今無上人新詞他誨人無隱聲我聞頓精進不遇傾心士那楷法將無錯認十載事臨池今日裏始歸真從此後書端謹越顯得言忠信若非交友箴規同懿親怎荷塺慈一視仁真蹟日録卷四
