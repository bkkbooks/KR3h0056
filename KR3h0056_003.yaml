  - {type: page-break, offset: 0, content: '', id: KR3h0056_WYG_003-1a, image: WYG0817/WYG0817-0553a.png}
body:
  text: 真蹟日録卷三明張丑撰劉原父墨蹟南華秋水篇按此條已刻書畫舫今刪梁武帝異趣帖愛業愈深一念修怨永墮異趣君示此帖前後不全當是子敬得意書或者見其作釋氏語遂以為梁武帝書一何陋也肻堂題時萬厯丙午冬仲十有四日大令書法外拓散朗而多姿此帖非大令不能辦彼恐一念墮于異趣而書法又深含竒趣耳太原王野題真蹟圖按此蹟書畫舫未詳記且無王肻堂王野題識故再刻之米菴自跋已刻不重列戴嵩烟郊縱牧圖神品烟郊縱牧竟何心部曲餘音尚可尋莫訝披圖觀小景太平風物似桃林兩兩三三野水邊從來鼻孔不曾穿桃林散后難收拾賴有幽人畫裏傳曾作經耕罷春臯雨一蓑周原風景自融和紋身不入田單陳扣角番成􅑔戚歌翡翠一川芳草潤胭脂萬㸃落花多牧童歸去來何晚空帶斜陽下小坡秦權烟草青溪放不歸源頭相喚自相呼畫師窺到無人處留得天真入小圖張潛晚牧江濵近水湖一聲羌管笑相呼戴嵩乘興奪真筆寫入烟波水墨圖狄戴倒載干戈事已空桃林縱牧為成功而今四海皆寧一模入雲山慘淡中杜衷古岸垂楊畔清溪淺水間畫工分布了任伴夕陽閒髙謙真蹟趙千里著色杜拾遺春遊圖君不見洛陽城闕天中起九衢歌管東風裏栁滿河橋花滿蹊車馬紛紛若流水是時臣甫年少未解愁尋芳時造酒家樓水邊麗人茫不省騎驢直過曲江頭朝吟飲東阡夕醉宿南陌殘杯饜富兒險語驚狂客樽空酒盡更典衣醉中看盡青山色明月滿身歸去遲花落花開春不知數書纍上不見録始恨窮老身流離宫中况失銜花鹿咫尺龍蛇起平陸房相門下死何辭嚴武牀前生不足風流事往今幾年一觀圖畫一凄然空餘金薤琳琅屑可以上繼古詩三百十一篇臨川黎近憶昨開元繁盛時選勝遊行恩命垂妝車飾馬載歌管山幽水曲增光儀流風一代足追賞好事拾遺尤任竒朝回春衣送酒媪蹇驢獨騎常酣嬉濃芳亂馥攪詩思咳玉噴珠文錦施曲江韋曲幾名勝旁鉤近托無纖遺辭華自緣家法好醉態不受山公嗤風塵斯須變京國六馬倉皇狩西蜀兩肘穿露謁行在轉眼春興成悲戚漂萍蹤跡誰復憐主翁交好繇宿昔築堂買田頗生事浣花溪路行來熟瀼西風物似優游杜陵門户何翻覆百年感慨寶應際語雖浩汗情蕭索此圖風致入模寫豈是流離愁局促酒債寧論俸錢少玉山每仗蒼頭力當時才士滿官署何不招擕豈性癖若遇襄陽孟浩然便當一笑𢋫三百天台張廷壁為惜花開花又飛馬蹄到處淡忘歸春光總入丹青筆千古王孫聲價希清河張翥蹇驢䭾過曲江頭滿面春風兩鬢秋何事先生醉如許非關多飲是多憂葵丘王徴真蹟劉右圖劉松年同作趙圖精圖古前元題詠極多今在項氏李伯時老子出關圖右老子出關圖一卷傅色運筆人物髙古豈舜舉輩能畫且不能摹擬矣直見令尹致問􅖫翁俯答之意宛然數千載于目前神品也余特定為李龍眠所作無疑後學沈周跋孔子大聖也猶問禮于老聃今尹何人而致敬乞言亦可見其賢矣此圖模寫當時之態已盡知畫者必能賞之延陵吳寬題閻立德王㑹圖虞芮芮國波斯國百濟國胡密丹白題國靺國中天竺獅子國北天竺􅀈槃陀武興國龜兹國倭國髙麗國于闐國新羅國宕昌國狼牙修鄧至國周古柯阿跋檀建平蛋女蛋國余觀閻立德所畫王㑹圖本諸唐貞觀間太宗事可見古之賢君以德歸萬國蓋昔三代盛時化格昆蟲鳥獸民俗敦美周之民從之如歸市夫帝王之治順之則歸逆之則去後至戰國暴秦以下無可觀者太宗平定之後以詩書賜外邦文化所至率賔遐荒其庶幾乎有國家者觀此孰無感焉是圖誠為後世珍鑑又非庸常繪畫所能以擬也耶是宜寶也子山記僧蘭谷得故畫蠻夷二十四國圖以示余傅色沉實而筆力能各盡其態誠可珍玩也按唐貞觀三年東謝蠻酋元深入朝中書侍郎顔師古請依周太史為王㑹圖㑹昌中黠戛斯既破回鶻其君長阿熱遣使者上書言狀宰相李德裕亦請為圖以示後世有詔以鴻臚所得續著之黠戛斯本堅昆國也唐制凡蕃客至鴻臚訊其國山川風土為圖奏之御前上于職方殊俗入朝者圖其容狀衣服以聞此所以詔鴻臚也宣和畫譜則以王㑹圖為閻立德之筆云又按宋祥符間判鴻臚寺張復亦請以朝貢諸國繪畫其衣冠采録其風俗為四夷述職圖注輦國王羅茶羅乍遣使娑里三文貢方物而張復復圖其衣冠上之今者有元大德被海內外四夷萬國莫不尊親來謳來歌混處無間孰得而畢狀哉於乎盛矣金華王餘慶古先哲王區分中外重譯來王厥德乃大成周之隆八方㑹同各以其職來獻鎬宫不承武王垂拱而治爰作王㑹貽法厥世日蜮月螖桂海氷天踰沙軼幕叩闕請前火齊錯落浮琛沉羽道路如織歸我天府春王三朝九夷賔將庭燎晰晰璧玉華光削衽解辮十百其耦象胥舌人繽相先後施于後世爰及有唐貞觀之治洽于要荒朝貢紛紜服章詭異惟天可汗是依是庇乃詔曲臺乃命鴻臚乃命良工繪王㑹圖咫尺滇池跬步瀚海狼居龍堆滅沒掩靄丹崕礫石墨水流澌一幅之間氣候屢移龜兹之樂巴渝之舞登于縑素鶱其欲舉昭揭邃宇以逺休聲羣公縱觀劍佩鏘鳴維圖之設有勸有戒惇德允云蠻夷冠帶聖皇鑒此無怠無荒日益月增山梯海航王㑹未書職貢莫紀時而揚之以對嘉祉右余館試王㑹圖贊吳君擕此卷請書聊為書之損菴堂真蹟圖廣川畫跋上王㑹敘録當入此俞子中書黃庭經萬歷乙未夏五二日解嘲堂裝黃庭經上有黃庭云云可長生永和等十五字不書原六十行俞六十五行其五十行後另一紙合縫後字素紙格式行隔水綾俞紫芝臨黃庭經仍似趙吳興用筆若無印欵便命之趙書矣董其昌題己亥七月八日後學文彭焚香盥手敬觀于友恭堂趙承㫖得鍾紹京黃庭用筆漸實俞紫芝親遊趙公之門宜其此作與他書不同也嘉靖己亥七月八日文嘉敬題真蹟宋黃庭堅草書談道章帖泥金標題祖教逈異祖意逈然傳一句教中廣布引三乘淨名倒嶽雷聲吼鶖子孤潭月影澄鄽市賣魚忘進級巖林飼虎望超升雖知同體權方便也似炎天日裏燈學難得妙按心學道海如塵認得曹溪有幾人若使聖凡無罣礙便應磚瓦是修真瞥然一念邪思起已屬多生放逸因不遇祖師親指的論機開口本難陳問來祇對不得莫誇祗對句分明執句尋言從教門只合文殊便是道虧他居士默無聲見人須棄䭾門物知路仍忘稚子名儻若不疑言念盡何妨默默過浮生無指的不居南北與東西上下虛空豈可齊現小毛頭猶道廣變長天外尚嫌低頓乾四海紅塵起能燭三塗黑業迷如此萬緣皆屬惺更須前路問曹溪自樂僻執雖然僻執不風流懶出松門數十秋合掌有時慵問佛折腰誰肻見王侯電光浮世非堅久欲火蒼生早晚休自藴本來靈覺性不能蹩步挂山頭問答須知起倒問答須教知起倒龍頭蛇尾自欺漙如王秉劍由王意似鏡當臺待鏡觀眊眼參差千里莽低頭思慮萬重灘若於此道爭源見何翅前程作野干言行相扶言語行時不易行如烏如兔兩光明守關晝夜精勤得非是貧瞋懈怠生菩薩尚猶難說到聲聞寫就輒論評然無地住長閒坐誰料龍神來捧迎一句子一句子言不可盡颯然㑹了奈渠何非干世事成無事祖教心魔是佛魔貧子喻中明此道獻珠偈裏顯張羅空門有路平兼廣痛切相招誰肻過古今大意古今以佛示東南大意幽微豈易參動指掩頭元是一斜眸拊掌固非三道吾舞笏同人㑹不彎弓作者諳此理若無師印授欲將何見語言談僧德潤贈道者一語真空出世間可憐迷者蟻循環此生勝坐三乘樂好句長吟萬事閒秋月圓來看盡夜野雲散去落何山到頭自了方為了休討經函叩祖關雲頂山德敷談道草章傳燈但録十首去取亦未必然然窮僻處無文字但隨傳燈書之耳書至此腕中痛欲脫都不成字自不可讀古人作草云意在筆前又云有錐畫沙法銀鉤蠆尾折叉股筆又有屋折壁漏觀公主家擔夫爭道公孫大娘舞劍器瀏離渾脫乃能造微入妙故可貴也若余所作草無復有是又未嘗規行矩步學古人但隨意塗令紙黑耳不知世間人那用求討懷藏耶其長四丈真蹟唐臨禊敘真蹟跋文皇始得蘭亭真蹟命湯普徹馮承素諸葛貞趙模各臨搨以賜羣臣後又命虞褚諸侍臣别為臨倣固定武以下石本之所自出者也此真承素真蹟昔見其子若孫而今見其祖矣山中人柳貫題唐太宗詔供奉官四人臨摹褉帖趙模諸葛貞得其筆意湯普徹得其形似而馮承素於形意二者兼有之此卷精神飛動下於右軍真蹟一等信希世之珍也翰林學士承㫖嘉議大夫知制誥兼修國史兼太子贊善大夫金華宋濓記真蹟寶晉齊簡帖本朝能書人帖門寶晉書簡帖上芾頓首再啓今嵗聖奏計故事代奏也使節到都八月半例九月跋行司西上十月到國門我公可到南都左右復西也餘並人吏面占芾頓首再行芾頓首再拜蒙教草一日望屈大斾云云大夫丈節下太夫人玉裕萬福不及拜别怏怏老妻伸奉泊趙婇郡君各希加愛芾再行芾頓首再拜右丞資政春官恩主鈞席仲秋漸涼恭惟台候動止萬福即日芾蒙恩昨以四月忝命改官盡緣知奬沒齒曷報六月被遣此邑聞台斾將至遲遲留七月以俟一識威采面感恩紀謁令弟始知不可俟抱悒之官近亦得令弟書始知對簾遂力疾作書以布下情其餘俟趨省詣府造門叩閣所懷非紙所罄不宣門生米芾頓首再拜右丞資政春官恩主台席謹空十一月草一日芾頓首上留守大資政丈鈞坐私居乏伺竟阻逮攀大斾此情惘惘念蒙令弟拂拭而久與明甫遊也故自竭有以獻惟公宏恕其愚而矜其志之善也願公開懷以待天下之士猶恐人之不自信勿以泥塗之久懷廷尉榜門之心深閉固拒以絶天下之士願以常情躬行髙世之事忘恩寃㑹通致出人意外晏然為明主安一世之人起治功致太平下誠之所瞻望中夜而興披衣筆草略死罪死罪右簡尺先臣芾真蹟臣米友仁鑒定恭跋芾頓首再啓故人作發運使都不照管下邑今十連作帥當似臨淮縣長官時故事但一片心脾依舊佳在不知委悉得過否芾皇恐再拜倅同官來江寧宰少小相識父處刁幕熟鄉人一戎同官來須少過從亦是未得報間同出入游山之人三處是飯主人貴人出入難不敢牽率知客位榜甚嚴此為常人設耳豈米老有不得船之理呵呵俟面干也芾皇恐再行糖霜大治喉咽甘辛尤能發散令化佳芾頓首真麝香一齊置痛處薰透氣立安芾咨芾頓首再拜聞公有官職壓人之說是何言公世德清茂才髙望重越自小官慨然任天下事宜比馬周此未足賀友固不奉佞也望日文德門多見諸公獨不見公何也癬方須得大段所方傳恐前書真不逹芾頓首再行知有令郎之戚此難遣也能書第二兒草嵗化去痛心肝至今皓白云由也癸至今二兒二女老年何缺文再到卒三姊懷落魄不缺文日佳般木亦須限外毋奪農時佳苦暑米可約過敝邑良食利人自愛草草芾頓首上瀹川宣德明哲閣下芾頓首再拜久違者幸兹邂逅不謂行役莫獲少延節旄以寫傾慕昨日繼見舟次不可俟留刺怏怏而歸適蒙雅誨且承食已首塗方寒千萬珍養訓仲相聚道意謹附便陳情早凍草草芾皇恐上運副朝散老兄節下芾皇恐頓首專介踵門蒙手教荷溫眷有加自承鹽邑還日夕排比宿司以俟臨按杳不聞好鄙弃下邑乃如此耶忽大熱恭惟比日尊體清勝芾挹冰中夕公私懼曠莽有何所聞且以見教在替數月矣過熱遂可射舟治行矣謹附使上謝不宣芾頓首再行管勾推官丈閣下不應武康清溪云云新聲舞翠鸞芾皇恐再行彥稽提學大節下抱疾之官百事皆委薛候改槐堂為寧一堂射堂去敗堵悉見北山萬叠命曰仰止堂于甲兄可謂無負矣芾衰落之人每臨一事歎仰兄精力不已力疾專使不宣芾皇恐頓首彥叶太史公提舉節下四月旦日狀芾啓衰晚辱誤恩法不可辭祗益悚懼蒙教賀重其慚悚附使且此草草芾頓首亦虛吾友不煩如此前言甚易當必不到入臺章也呵呵餓殺客也芾頓首安中吾友昨夕作此簡未及遣承寵誨荷垂眷今早食改作晚阻城外約來早告顧舟中北城外一飯幸甚幸甚芾頓首芾頓首再行先白吾友疏展晤思企暑中起居何如小兒未聞師誨願以童蒙之道不之謹遣侍筆硯于左右惟久要終始造成之悚悚異日報德不宣芾頓首再行先白吾友同舍萬福芾頓首再啓比苖幕過道從云云久彼留也芾頓首再啓十一日芾皇恐大雨恭惟台候萬福名筆為亂道遂汙矣七月一日大年約來蒲池閲畫能一寺乎草草芾頓首再啓公震太尉台坐芾皇恐蒙教審台候萬福牌寫了久云云兒子入寺撿未得也區區别啓芾皇恐上公震太尉台坐古紙三月十一日芾啓頓首衰老蒙誤恩徑西不得少留以承二君子動止伏惟珍愛珍愛芾頓首再行安中學士巨中吏部二友麾下芾頓首再拜運使大夫丈節下昨以手拙附專介以代占謝恭想已達左右即日春和恭惟神明相佑尊體動止萬福芾即日蒙恩未即詹望伏乞對時精調興寢下情䖍祝謹因便介附起居不備門吏米芾頓首再拜運使大夫丈節下黻補填尚少八日以新府公至理須出見假登舟至真滁日移疾告本未審尊意如何黻蒙恩有素不勝傾倒之至黻頓首芾皇恐來早為一麵少延道韻只今衩衣在此烹茶久俟芾皇恐府公少監大夫公右宣和南宫舍人寶晉米公芾字元章真蹟六十四帖分五卷中興初思陵以萬幾之暇垂意筆法始好黃庭堅書故戒石之銘以頒而方國之一札皆似之後復好公書以其子敷文閣直學士友仁侍清燕而宸翰之體遂大變追晉􅞂唐前無合作珂家所藏詔墨幾百軸以嵗月考之良是是故紹興間公書盡歸九禁而世罕傳最後赤水得珠頤神北內躬御寶跗製翰墨志多紀公遺事益知帝心簡注惟公是嗜是帖蓋天上本有內府圖書可識前五帖嘉泰壬戌正月得之中都范氏次十帖開禧丁卯五月得之李本寧客何師說又次四十帖嘉泰戊辰二月得之京師官鬻者又次九帖己巳嵗八月得之德清李氏其間四詩同卷不復别贊曰論書自晉始蓋自其之清而流之于妍代又以其習尚之之于專維唐設科自言作成自初歐褚爭先薛靚張顛顔真柳便中世而後雖經生楷𨽻猶得以揚鑣而鳴鞭五季日卑有宋興焉士以德進捨藝之偏既窒其進取之塗故世之以書名家者皆不雜以人而純乎天更八葉之豐豫乃設學而詳延有芾者出集其大全蓋繇羲獻而來遡崇觀而前或營萃而拔棘或宫牆而及肩或小醇而大疵或舍正而取權六書之統殆所謂芾之死而失其傳也巘巘喬嶽洋洋大川草木風雲波濤蛟黿我系此評其然豈然較三十里後八百年相臺嶽珂撰宋刻石帖唐子畏寫生東家有棗西家食張氏靈芝還與張信道楚弓憑楚得春風處處自生光獻之求芝漢文得之同氣相求蓋有自也唐寅真蹟芾啓壁上山水二幀暫借一閲芾啓上山甫早望臨辱五介往芾頓首秋序澄清恭惟運使御下尊履多暇泰和平協他日見面傾倒也芾頓首再啓李君子吏于朝不愧侍從才當路謾以為用奉載良銘要垂百年非敢故無言暑未退起居何如嶽南峙山林間民常蘇請同此嘉趣也石刻唐六如墨竹唐寅畫竹叢頗似生成者原非筆有神蓋是心自野真蹟沈啓南贈吳文定公行卷玉峰張丑曰在昔沈氏啓南為原博太史贈行圖詠其畫全倣松雪翁而時時雜出北苑使家法可謂人巧極天工錯矣第布景設色蓋是九秋登髙而詩句又作三春景象似屬難解意啓南盤礴始於西帝司權時至東皇出令之日太史始成行耶否者鮮不以看朱成碧疑之矣然詳觀書畫並出壯年手筆定為啓南第一神品無疑能令吾家仙山樓閣卷不得專美於前寧非絶世名蹟與裝成敘而藏之以當剖腹若曰願為啓南曹丘焉則吾豈敢時泰昌紀元嘉平八日真晉齊書真蹟崇禎戊辰暮春之望訪項氏獲觀宋元畫册內有宋髙宗人參地黃圖贊對幅畫係院人佳品書亦非思陵細觀補揠花甲小璽可辨楊妹子題花卉對幅及仇逺等跋其姑蘇吳氏文顒宋繡暨沈氏子蕃朱氏克柔刻絲山水樹石人物花鳥種種足稱針絶絲絶次出沈麟矮幅畫山一卷筆意全倣郭熙後有倪瓚詩跋次出李公麟定林蕭散圖卷後有陸佃趙孟俯陳方等五跋次出周文矩織錦回文圖卷前有晏如題署後有宋人細書則天皇后御製記文黃子久山水大癡道人為雲林生畫層巒曉色按此條已刻書畫舫今刪石田畫卷華麓山前有此家芙蓉空翠濕窗紗更教秋樹雜春樹還愛朝霞及晚霞不假丹青真是畫尚容杯酒惜餘花書樓我記在木末壁上小詩留墨鴉沈周年來殊覺故交闌一段深盟托小山夜月披襟雙玉契春風露頂兩青鬟陶籬把酒論心處謝駕停雲暫别間如此相宜還不惡紛紛塵土果何顔長洲祝允明真蹟新安汪氏閟藏絹本真草千文一卷相傳為虞伯施臨永禪師筆宋思陵跋之甚詳余細辨之實思陵妙蹟與韓氏絹本晉人小楷曹娥碑真蹟並一手臨寫雖宋人書自是一種僞好物今人不能為也近歸韓朝延家卷前失去真書千字文一行後有賜思溫三字其思陵一跋别紙所書其俞友仁錢宰二跋未及録之惜為妄人用紹興僞璽亦是白璧微瑕當截去耳虞伯施書學原出永禪師宗𣲖宋思陵嘗臨其真草千文以賜思溫故後紙題識盛稱伯施筆法之妙而不言其臨永禪師書也俞友仁錢宰不知何據直云伯施臨永禪師之作其見逺出孫鳳下矣按孫鳳法書鈔云宋髙宗臨虞世南真草千文并系御製跋語以證左之嗚呼鳳特工伎小丈夫耳其鑒賞乃爾是宜文夀承博士纂入九能志中也陸生擕示郭熙溪山秋霽畫卷按此條已刻書畫舫今刪米海嶽行書蒙教帖凡六十字舊藏嶽倦翁家嘗模刻英光堂中今宋搨具存氣韻肥濁不類此真蹟卷自文氏至豫家雖剝蝕之餘而筆趣翩翩神采奕奕正如神龍夭矯非葉公畫龍之可擬議耳玉峰張丑在米菴東序對月下書時泰昌紀元中秋三五日也李泰和真蹟毒熱帖按此條已刻書畫舫今刪韓朝延云曾于士友處觀李雍雜蹟字約八千其家號為萬金帖後竟以此賈禍語云匹夫無罪懷璧其罪信夫石田大設色秋山卷屋二十帶人十四個松八株桐十三株柳六株夾葉九株㸃葉十六株枯木二十株樹根十一顆竹二處橋五條船二隻牛馬各一頭王維江干雪意卷藏王敬美家又梁伯龍示余大青緑師子羅漢一軸亦云右丞筆也按江干雪意題詠備載書畫舫石田小幅海上聞多警騎驢難獨行不知髙枕者曾有夢相驚久欲一過沙溪樂親戚之情話近聞盜作聊此問訊沈周題寄允孚賢弟辛丑真蹟書載記略米元章有寶章待訪録列親見與所聞者法書名畫為二等今倣其略小楷楊羲黃素黃庭內景經見趙子昻詩禁長歌今在吳門韓郡守家余館師韓宗伯所藏凡四千言書類郗超右軍之外别有異趣當為天下第一曹娥碑真蹟卷有髙宗跋是北宋物元文宗命柯九思鑒定御府書畫因賜之以旌其勞趙承㫖題云如嶽陽樓親見呂仙聽吹笛可以稱量天下之書矣在婁江王文肅公家靈飛六甲經鍾紹京書為玉真公主寫進御明皇有徽廟標題後有倪雲林虞集跋全倣黃庭經趙子昻師之十得其三耳海寧陳太常次公所藏黃庭外景經真蹟此卷未見據友人云與內景經同一絹素同一筆法又有云似宋髙宗臨者在吳江吳憲副家顧愷之女史針不全本在嘉禾項家其書類大令十三行洛神賦古徑可愛行草蘭亭序褚河南臨白澄心堂紙朱元章跋在海寧陳家缺三行又蘭亭褚臨墨蹟絹本王弇州家藏後歸新都汪太學有朱元章小行楷跋今在廣陵蘭亭唐標第七本絹素奕奕無題跋亦似褚筆今在新都王氏書畫舫蘭亭白麻本張金界奴進真蹟在余家今為茅元儀將軍所藏其細君名宛者日臨石刻蘭亭故以歸之蘭亭石刻有隋開皇本在唐太宗命蕭翼取之辨才摹刻傳世者之前余家有之今歸京師友人此外定武本不勝紀顔魯公祭季明文真蹟鮮于伯機所藏跋云吾家無第一天下無第二今在新都吳太學家停雲館所刻乃米臨余刻之鴻堂帖者是此本也顔魯公送劉太冲序烏絲箋書北京國學刻石其真蹟竒宕為遼東李帥如松所藏李物故其家圖書皆散今不知所在李懷琳書絶交書真蹟安福張司馬家藏武林楊侍御曾屬余跋缺一鸞字停雲館帖亦然余以行穰帖較之乃絶相似行穰右軍筆也思其故當是蕭齊時摹右軍書蕭齊避祖諱故缺鸞字耳遂改跋右軍後為朱吏部世守所藏朱被盜余意此卷必投之水火矣韓古洲郡守乃于長安得之又質于來大參復實天下行草第一王右軍官奴小女玉潤帖真蹟新安許少師家藏本得之王元美後落飛鳬手今聞轉入粵東王大令東山松帖真蹟送梨帖真蹟皆曾見之今不知歸何人右軍零落數字成卷者甚多不能殫述虞永興汝南公主志王元美家物後歸汪景純今仍在新都丁卯四月望書其昌真蹟自詠五絶呈野航先生寅上維摩臥病餘鬚髮李白長流棄室家案上酒杯真故舊手中經卷浪生涯鉛華隊上揮金客荆棘圍中奪錦人今日方牀一居士白藤如意紫綸巾面上有恭徒自苦心中無愧始為賢憑誰寄語機關客開歷頻頻看紀年裘馬少年輕俠客香燈今日病頭陀故人不必多相忌杯粥麻衫願不多髙懷自信能忘我隱者何妨獨潔身無所不知方是富有衣典酒未為貧真蹟金章宗羣玉中祕印其用于書卷者文粗用于畫卷者文細細者自當讓粗賈秋壑悅生圖書其用于書卷者文小其用于畫卷者文大大者當遜小真識當知之褚河南小楷西升經按此條已刻書畫舫今刪崑山周氏示余先世流傳仇英采蓮圖卷白宋紙淺絳色畫全倣劉松年筆妙甚後有俞質父行草篆𨽻書六朝唐人詩賦并跋尾詳其題識蓋為于黃甫作也品在蓮溪漁隱圖上采蓮圖而署書曰鑑湖春色或云逢年一時筆悮余曰否否圖中有畫三婦艷焉其春色珆描此耳荷花屬夏誰不知之曾謂逢年智出婦人小子下耶或稱不敏而退戴生擕示子昻小楷道德經一卷前有白描頭陀立像一尊書畫皆精向藏檇李項氏即妮古録中所載者惜用元箋書之紙性脆弗及澄心蜀繭耳大德九年十月八日公又楷書洞玉經一卷精楮所書墨彩煥發字頗肥澤較之道德經為稍下韓存良太史家黃素黃庭內景經真蹟小楷帶行係懸腕疾書是海嶽翁臨揚羲書雖非鮮于太常伯機藏本誠可寶也丑按寶章待訪録稱原本合縫識尾有鍾紹京等印并陶榖等題跋又按雲烟過眼録經後有楊元靖許穆之印及米芾跋語趙孟俯長歌而今皆無之其為臨本無疑矣苐出米老手筆自是比衆不同董𤣥宰定為楊真人書非也敢以就正真賞者慎獨清賞老年自覺筆頭迂寫畫如同寫𨽻書黃鶴一聲山館靜道人正是午參餘坦齊老師出宋羅紋紙命作泉石老年自是不同作此應命不記嵗月黃鶴山人書于坦齊仙館真蹟王叔明惠麓小隱畫卷按此條已刻書畫舫今刪北宋寫本復古編二册政和間吳興張有著前後有程俱等二敘其論篆文也陽冰以後不可多得或以道流少之過矣倪雲林跋黃子久畫卷本朝畫山水林石云云按此條已刻書畫舫今刪元鎮髙士幽澗寒松圖詠按題乃是寫贈周遜學者詳其風格蓋晚嵗筆也此圖收藏得地紙質如新神采煥然舊為何元朗故物今在溪南吳氏按以上已刻書畫舫其家尚藏蜀素小行書前後赤壁賦係東坡真筆惜以避諱割去題名亦妙蹟云東岡草堂圖者倪清祕早年筆也按此條已刻書畫舫今刪趙子昻真書南華秋水篇全學蘭亭韓朝延故物也後歸松陵沈氏一峰道人寫贈曹雲西沙磧圖紙本淺絳色行筆細潤布景精微是袖卷中之不易得者本身有錢鼒詩跋後有張雨饒介之姚廣孝袁忠徹題詠品與倪元鎮贈耕雲畫卷相伯仲也按此條與書畫舫所刻小異至正景午大暑宴于朱氏玉井香水亭名賦詩十有二韻書似西枝玉海鸐臺三才子共和之朱公神仙人冰雪照肺腑祖帑閲羽化祖書在册府門掩一畝宫虹梁跨風渚喬木八九株梧桐夾槐櫸中有玉井香銀雲灑洗音零雨俗士不必來佳朋來不拒鬻茶不無童謀酒自有婦核破玉刃霜大桃筒卷金莖露上聲讀方響歌洞仙白題舞魔女梧溪斥琴操主者極能評詩謂梧溪子擬琴操為失體可揩鐵雅鳳咮云海嶽訂畫譜米老為書家三變也棹歌發復留冰花凉欲語焉知人間世大火虐如虎箕尾叟在草元閣書東魯先生考校按此條原本至白題舞魔女以後脫去一葉今從姚氏好古堂書畫記補録為箋紙上小圖標云寶晉齊研山圖并有不假雕琢渾然天成凡十四字小篆書也中間標記凡四十八字用𨽻古書之而圖寫研山用淡墨染成稍稍有濃墨堆積處最後通身用淡汁緑烘鎖行筆古徑可愛其銘文連題識計三十七字大徑二寸用秃筆疾書乃晚嵗作也前後有御府之印紹興悅生等圖書惜小米鑒定兩行今亡之矣其後永樂間江西潘若水作序一篇敘次甚詳惜未能録入米老外集為缺事耳是日又見趙文敏公行書東坡前後赤壁賦卷紙墨精好用筆全倣坡老古徑無比末行題云子昻為嶽上人書大德三年十二月晦詳其印識為莫氏故物細觀收藏得地神采煥然蓋趙書中之不易得者按此條原本前悅一葉顔魯公鹿脯帖白麻真蹟行書絶佳而筆精墨妙乃紹興祕府故物舊藏嘉禾項氏蓋唐人書之不易得者項氏又藏劉松年絹本浣花醉歸圖短卷亦妙前元人題跋極多趙子昻小楷髙唐賦為崔進之作朱絲欄本尤佳倪元鎮畫顧仲瑛三教象有元鎮贊文小楷精謹畫全倣李伯時白描仲瑛自書一詩于其上皆名蹟也錢霅川設色歸去來圖卷前有篆文歸去來圖四字畫本身上題云衡門植五柳東籬采叢菊長嘯有餘清無奈酒不足當世宜沉酣作邑召侮辱乘興賦歸歟千載一辭獨吳興錢選舜舉其後鮮于樞草書歸去來詞于後亦妙後又有題云典午山河已莫支先生歸去自嫌遲寄奴小草連天緑剛剩黃花一兩籬長洲沈周孔子不脫冕淵明不束帶避人避世心總在忘言外章憲真蹟憲按此條又見三集詳載圖記而無章一詩或别是一蹟今兩存之馬和之著色二南圖絹本小冊有趙承㫖楷書毛詩對題亦在韓朝延家朱忠僖故物也朝延又云逸少鶻等帖在其家即書史所載者並劇蹟云王越石新購徐季海寶林寺詩後有王叔明和韻之作楚楚可愛又購李泰和永康帖後有宋景濓跋皆檇李項氏物足稱雙璧米書大字天馬賦舊藏嚴分宜家其書豪舉縱逸真是放而能妙者今吳中有石刻徒得其欹側怒張之態而未盡其秀媚映發之姿此蓄法書者所以必求真蹟也張子有續收大米手柬十三帖係宋裱舊本內有與友仁手書乃是商榷買東禪寺僧世藏逸少王略帖者舊傳據舟狡獪殆不然也其玉蟾蜍一帖尤佳餘九帖皆精非漫興數行可擬議耳梵隆紙本白描洛神圖宋思陵小楷書曹賦文于行間其畫全倣顧虎頭與韓存良太史家設色本不差毫髮三也罷說也罷話助之詞一曰詞之終也其翻羊者切與野冶同音罷乃休也止也已也廣韻薄蟹翻收入十二蟹餘不再見禮韻亦收入十二蟹而以部買翻與隂氏韻翻收俱同惟毛氏韻收入四十䘞而以皮駕翻引漢書曰諸侯罷戲下賈氏韻以皮買翻其音與禮韻隂韻略同祝氏韻以普馬翻入開音清普屬師卦之第五爻馬屬兌卦為水土音月月聲楊氏韻以並駭翻以四聲等之入牌罷料拔劉氏韻同翻而入排罷敗拔中州韻入霸又與毛氏韻同歷考韻書則北音呼罷為去聲南音呼罷為上聲則也之訓為助語與決詞罷之訓為休止乃北音也若以南音訓之則也為就也即也罷為住也亦為休也又為自止也瑞之丁君以也罷自謂君乃吳人合從南音也以羊者翻罷以部買翻為當則所謂也罷者就住也即休也就自止也夫人之趨名利者莫不以髙逺為期故臨海望洋而歎其莫濟騎危觀天而傷其難登瞻烏不知止于何屋逺之不可到也行蝸竟黏枯于誰壁髙之不可極也知髙逺之不可極到而假足以趨脅翼以升蓋以萬萬計瑞之乃反其所向不急名不尚利即其所在而自止其賢明出于萬萬者之上矣豫嘉其合老氏之㫖義而獲我心之同然故為說其字之音辨而係以志趣之所尚焉時正德甲戌重陽書于桃花精舍之夢墨亭唐寅識後有張伯起跋不及録也罷丁君小傳也罷世語猶云亦可已矣東吳丁君以為稱如憾而實安君子豫之多從為之辭余特為徴敘其行已大略以為小傳庶覽者知其稱宜而不誣丁氏在江隂為巨族故南園翁自新贅長洲溫氏始為蘇城人祖胥宇即富業起聲君其孫也名文祥字瑞之天性孝順髫丱時依釋氏法啖素飯三年用為報母或以異教不足馮何事自苦對曰以悅母心無害于理父壯嵗痿疸君才十五夜臥父懷膝間以溫之不少離輟七嵗從河間訓導王夢祥授小學十嵗從同知顧公昌授大學更從今鄉貢進士莊仲威業舉子之學久之父漸老家事鞅掌庸調冗㳫倦于支應以命君君歎曰吾志也願移以為忠今不果當不守以為孝乎吾學也願用之國及之衆今不果當不用之家行之宗戚友朋州閭乎由是始自稱曰也罷去營殖生産每泛重貨貿遷北都資積日阜然率不肻損人以益已剝衆而豐家平居雅意不忘清逸收拾古器物撫玩若交契遇暇日遘勝地遨游觴吟熙然自適事兄如嚴父友弟若赤子宗族特稱而效之親才哲睦鄉黨不録人小過不忘人小惠君子接之初以為肆久而多其不流也衆人接之始以為慢終而樂其不欺也言期于信彼或信或否則曰也罷行期于必善彼或知或否則曰也罷志其上獲其次曰也罷失于彼得之此曰也罷以是二言存之心安諸行素履逹時夷然以處于世而鮮有不自得者贊曰恆情喜進惡退知止者寡地當其才而安之不踰者猶鮮每出位而饒輒以賈敗古今若是者可勝計哉矧所挾尚羸每為時勢縮而限之昧者于是怨怒蒙冒以求前數終不諧焦然以病其生者何限匪欲罷不能乃將以人越天耳丁君材具如是使其學不以家止成而取祿位以若今之治家處世者而推之亦若是治耳既不得之或焦以病亦不足貴也乃以不可罷者得罷而安之雍舒自得用受康逸之享何其善也世有不得已而罷不能安者視君何如哉矧越分竊享而猶不止者又何如哉故謂君于是不啻加人一等而已老子曰知足不辱知止不殆君固深得其㫖趣而孔子曰君子素其位而行不願乎其外斯殆君之所願學也歟正德癸酉冬日同郡祝允明撰也罷吳奕為瑞之丁君篆真蹟仲後有文徴絳色山水東風吹動看梅期簫鼓聨船發恐遲斜日僧房怕歸去還擕紅袖繞南枝乙亥嵗二月中旬游錦峰上人山房戲寫梅枝并絶句為贈唐寅記真蹟竹之徑蘭之香石之貞苔之蒼宜伴野人居乎山房唐寅顧清臣尚書集書學之大成按此條已刻書畫舫今删黃子久春舟圖小幅紙本淺絳色清逸可喜上有袁柳莊等三題詠亦名蹟也今在檇李人家李成讀碑窠石圖按此條已刻書畫舫今刪右軍鶻等帖按此條已刻書畫舫今刪真蹟日録卷三
