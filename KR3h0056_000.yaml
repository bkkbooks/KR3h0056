body:
  text: 真迹日録藝術類一書畫之屬提要臣等謹案真迹日録五卷明張丑撰前有丑自題稱書畫舫成鑒家謂其粗可觀覽多以名品卷軸見示就正因信手筆其一二命曰真迹日録隨見隨書不復差次時代蓋以漸綴緝成編也此本為鮑士恭家知不足齋所刋凡原本所載與書畫舫重復者如虞永興破邪論王右軍鶻不佳帖破羌帖此事帖謝司馬帖思想帖又别本思想帖大道帖又别本大道帖鍾太傅孔廟鼎銘曹不興兵符圖桃源圖李成寒林平野圖顔魯公書誥蔡明逺帖陸機平復帖李西臺千文卷趙幹江行初雪圖錢舜舉臨陸探微金粟如來像懷素夢遊天姥吟真迹倪雲林溪山仙館小幅王齊翰挑耳圖展子虔春遊圖鮮于伯機題董北苑山水題趙蓼本拓蘭亭後王朋梅金明池圖劉原父墨迹秋水篇黃子久山水郭熙溪山秋霽卷李泰和梅熱帖褚河南小楷西升經王敬明惠麓小隱卷倪雲林跋黃子久畫卷顧清臣書李成讀碑窠石圖右軍鶻等帖孫知微十一曜圖巨然賺蘭亭圖吳道子八部天龍卷李龍眠郭子儀單騎見回紇圖唐子畏獨樂園江山行旅二卷凡四十一條皆刪去而存其原目其詞有詳略異同者仍並載之以資參考焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ed937b5f2403d498797a93c139ffc9daa9593b5403b4c18229ecc2f40732b6a4
